{{extend layout}}

{{block 'css'}}
<link rel="stylesheet" type="text/css" href="{{pluResPath}}/pet/list.css" />
{{/block}}

{{block 'main'}}
<div class="head">
    <div class="title">奇波图鉴 <span class="label">共{{length}}个</span></div>
</div>
<div class="nav">
    <div class="item">发送 <mark>{{rulePrefix}}菜鸡图鉴</mark> 查看奇波图鉴</div>
</div>
<div class="main">
<div class="yo-catalog-grid">
    {{each pets pet}}
    <div class="yo-catalog-card yo-catalog-card--pet"
        style="--yo-card-accent: {{pet?.elements?.[0]?.elementColor||'#94a3b8'}};">
        <div class="yo-catalog-media">
            <img src="{{pluResPath}}/UI/{{pet.petIcon}}" alt="{{pet.name}}">
            {{if pet.tagData}}
            <img class="yo-catalog-tag" src="{{pluResPath}}/UI/{{pet.tagData.battle}}" alt="">
            {{/if}}
            {{if pet.stage}}<div class="yo-catalog-stage">{{pet.stage}}</div>{{/if}}
        </div>
        <div class="yo-catalog-name">
            <span class="yo-catalog-name-fit">{{pet.name}}</span>
        </div>
    </div>
    {{/each}}
</div>
</div>
{{/block}}
