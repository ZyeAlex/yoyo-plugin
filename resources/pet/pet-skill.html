<style>
    .pet-skill {
        margin-bottom: 12px;
        font-size: 26px;
        display: flex;
        align-items: flex-start;
    }

    .pet-skill>:last-child {
        flex: 1;
        min-width: 0;
    }

    .pet-skill .pet-skill-img {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        margin-right: 16px;
        flex-shrink: 0;
    }

    .pet-skill .pet-skill-title {
        display: flex;
        width: 100%;
        align-items: flex-end;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 8px;
        padding-right: 12px;
    }

    .pet-skill .pet-skill-name {
        font-size: 34px;
        font-weight: 800;
        padding-right: 8px;
        line-height: 1.15;
        color: var(--yo-text);
    }

    .pet-skill .pet-skill-title > div:last-child {
        font-size: 22px;
        font-weight: 700;
        color: var(--yo-text-muted);
    }

    .pet-skill .pet-skill-desc {
        margin-top: 10px;
        margin-bottom: 6px;
        font-size: 26px;
        color: var(--yo-text-secondary);
        line-height: 1.5;
    }
</style>

<div class="pet-skill main">
    <div>
        <img class="pet-skill-img" src="{{pluResPath}}/UI/{{skill.icon}}" style="background-color:{{eleColor}};
        box-shadow: 0 0 5px 3px {{eleColor}}">
    </div>
    <div>
        <div class="pet-skill-title">
            <div class="pet-skill-name"> {{skill.name}}</div>
            <div>lv.5</div>
        </div>
        <div class="pet-skill-desc">{{@(skill.level[5]||skill.level[0])?.skillDescribe.replace(/\n/g, '<br/>').replace(/<color=(#\w+)>([^<]+)<\/color>/g, (_, color, text) => `<font color="${color}">${text}</font>`).replace(/\{(\d+)\}/g, (_, index) => (skill.skillLevel[9] || skill.skillLevel[0])?.value[index])}}</div>
    </div>
</div>
