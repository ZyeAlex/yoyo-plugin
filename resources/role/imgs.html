{{extend defaultLayout}}

{{block 'css'}}
<link rel="stylesheet" type="text/css" href="{{pluResPath}}/role/imgs.css" />
{{/block}}

{{block 'main'}}

<div class="head-box">
    <div class="title">{{roleName}}图片列表</div>
    <div class="label">共{{roleImgs.length}}张</div>
</div>
<div class="role-imgs">
    {{each roleImgs roleImg idx}}
    <div class="role-img">
        <img height="180" src="{{pluResPath}}{{roleImg}}" alt="" />
        <div class="role-text">编号：{{idx+1}}</div>
    </div>
    {{/each}}
</div>

{{/block}}
