{{extend defaultLayout}}

{{block 'css'}}
<link rel="stylesheet" type="text/css" href="{{pluResPath}}/role/card.css" />
{{/block}}

{{block 'main'}}
<div class="role-card">
    <div class="role-img">
        <div class="role-img-img" style="background-image: url('{{pluResPath}}{{roleImg}}');"></div>
    </div>
    <div class="role-box-1">
        <div class="role-basic-message">
            <div class="role-name">{{roleName}}</div>
            <div class="role-race">{{race}}</div>
            <div class="introduce-row">
              <div class="role-introduce">&nbsp;&nbsp;&nbsp;&nbsp;{{introduce}}</div>
            </div>
        </div>
        <div class="other"></div>
        <div class="other"></div>
    </div>
</div>
{{/block}}
