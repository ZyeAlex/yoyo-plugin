{{extend layout}}

{{block 'css'}}
<link rel="stylesheet" type="text/css" href="{{pluResPath}}/hero/list.css" />
{{/block}}

{{block 'main'}}
<div class="head">
    <div class="title">角色图鉴 <span class="label">共{{heros.length}}个角色</span></div>
</div>
<div class="nav">
    <div class="item">发送 <mark>{{rulePrefix}}寒悠悠图鉴</mark> 查看角色图鉴</div>
    <div class="item">发送 <mark>{{rulePrefix}}寒悠悠图片列表</mark> 查看角色图片</div>
</div>
<div class="main">
<div class="yo-catalog-grid">
    {{each heros hero idx}}
    <div class="yo-catalog-card yo-catalog-card--hero rarity-{{hero.rarityClass||3}}">
        <div class="yo-catalog-media">
            <img src="{{pluResPath}}/UI/{{hero.headIcon}}"
                onerror="this.onerror=null; this.src='{{pluResPath}}/common/hero/icon.png';this.style.width='85px';">
        </div>
        {{if hero.professionData}}
        <img class="yo-catalog-career" src="{{pluResPath}}/UI/{{hero.professionData.icon[0]}}"
            style="background-color:{{hero.elementData?.elementColor}};">
        {{/if}}
        <div class="rarity">
            <img src="{{pluResPath}}/common/rarity/rarity-{{hero.rarityClass||3}}.png">
        </div>
        <div class="yo-catalog-name text">{{hero.name}}</div>
    </div>
    {{/each}}
</div>
</div>
{{/block}}
