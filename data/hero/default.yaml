    IdleFavorAbility: null
    GreetingMorning: 早啊，我还以为你肯定起不来呢。
    GreetingAfternoon: 啊，都这个时间了，已经没你的出场机会啦。
    GreetingEvening: 呜哇，你什么时候过来的！不要这样吓唬人啊！这么晚了，赶紧睡觉去！
