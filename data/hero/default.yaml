  charData:
    characterGroup:
      id: 99
      name: 无阵营
      icon:
      - tex_icon_group_small_16.png
      - tex_icon_group_normal_16.png
      - tex_icon_group_large_16.png
    characterRace:
      id: 11
      name: 帕米族
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      游历于各地的寻宝探险二人组的成员之一，能够轻松举起和自己娇小的身躯差不多大的锤镐。
      虽然大部分时间总是在睡觉，但也总能顺着梦中宝藏线索的指引，完成一场惊天动地的探险——
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_199003_Introduce
      title: 自我介绍
      text: 名字是诺诺。想要和寻宝队的大家一起，找到更多亮闪闪的宝物。嗯？还有什么要介绍的…啊，诺诺，讨厌橡果。
    - audioEvent: Play_VO_System_199003_EnterInterface_01
      title: 详情·1
      text: 唔，要一起玩吗？
    - audioEvent: Play_VO_System_199003_EnterInterface_02
      title: 详情·2
      text: 橡果飞击——！嗯，满分。
    - audioEvent: Play_VO_System_199003_EnterInterface_03
      title: 详情·3
      text: 宝物？在哪里？！
    - audioEvent: Play_VO_System_199003_AboutSelf_01
      title: 关于自己·1
      text: 这个锤子，用来砸墙和挖土，速度很快。在寻宝的时候很有用。所以…要一直带着。
    - audioEvent: Play_VO_System_199003_AboutSelf_02
      title: 关于自己·2
      text: 最擅长的游戏，是打地鼠。上次玩的时候，诺诺「噗咚——」一下，就把所有洞砸成了一整个大坑…嗯？不是这样玩的吗？
    - audioEvent: Play_VO_System_199003_AboutPlayer_02
      title: 关于星临者
      text: 胆子很大，很聪明，还很强…要是能加入寻宝队，就好了。
    - audioEvent: Play_VO_System_199003_AboutWorld_01
      title: 世界见闻·1
      text: 想去，阿瓦利安看看。缇缇说，那里到处都是亮闪闪的…能找到很多宝物吧，应该。
    - audioEvent: Play_VO_System_199003_AboutWorld_02
      title: 世界见闻·2
      text: 夏露露村的大家好像很少出门，去更远的地方…但是，他们研究出来的烤肉很好吃！嗯，诺诺喜欢夏露露村。
    - audioEvent: Play_VO_System_199003_Information
      title: 趣闻
      text: 嗯？
    - audioEvent: Play_VO_Battle_199003_UltimateSkill
      title: 必杀技
      text: 够了！呼啦啦地——猛锤！全部打倒…！
