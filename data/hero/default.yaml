      普攻第四段时，可多次连续施放，使之成为持续的多段伤害，随着普攻次数增加，普攻伤害逐渐提升。在普攻第四段过程中施放重击，将派生为额外重击。

      【重击】蓄力重击，造成{1}攻击力的<color=#B07373>火属性物理伤害</color>。
      在普攻第四段的持续攻击过程中蓄力重击，将派生为额外重击，同时提升韧性效果，造成{2}攻击力的<color=#B07373>火属性物理伤害</color>，且会使下一次施放的星鸣技得到强化。

      【闪击】造成{3}攻击力的<color=#B07373>火属性物理伤害</color>。

