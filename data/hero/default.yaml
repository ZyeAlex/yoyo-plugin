    IdleWeather_02: 哎，这什么鬼天气…
    TreasureFound_01: 运气不错。
    TreasureFound_02: 逃不过我的眼睛！
    TreasureGet_01: 我当然拿得动！
    TreasureGet_02: 都带走啦。
    TreasureGet_03: 也算是小有收获。
    ResourceFound_01: 拿回去吧。
    ResourceFound_02: 在这儿呢！
    ResourceGet_01: 清点好了。
    ResourceGet_02: 差不多就这些了吧？
    ResourceGet_03: 拿好了！
    WorldPuzzleSolve: 咳咳…嗯，还挺聪明的嘛。
    NormalPuzzleSolve: 问题解决了？
    ItemRequired_01: 要是早点做了准备就好了…呜…
    ItemRequired_02: 别在这儿晃了，先去找有用的东西吧。
    Switch: 你希望的话…那我就陪你一会儿吧。
    Scenery: 哇…想去上面看看！
    LandMark: 这个是…？我也没有很好奇…又不是小孩子…
    NormalEnemy: 那家伙看着就烦，怎么办。
    StrongEnemy: 那家伙，有点不好对付…
    FoundbyEnemy: 要开打了，自个儿跟上！
    EscapefromEnemy: 哼，看来那些家伙是怕了。
    BackHPHigh: 这点成就不值得大惊小怪。
    BackHPMed: 早就说了，没问题的。
    BackHPLow: 就、就算它很能打好了！
    BackFailed: 怎怎怎么会这样！
    VictoryMVP: 哼哼，我就承认你作为战士的资质吧！
    VictoryAudience: 换成是我也不会输的！
    Victory: 当然会赢了！
    HealWarning: 快点治疗啦，要是出事了怎么办。
    QuestTake: 行行行，我记得啦。
    QuestComplete_01: 喏，这样就好了吧？
    QuestComplete_02: 答应的事情，当然要做好。
    Dash_001: 呼。
    Dash_002: 呀。
    Dash_003: 嘿…
    Jump_001: 欸。
    Jump_002: 哟！
    Jump_003: 咻！
    Leap_001: 欸咿。
    Leap_002: 哟咻！
    MountRide: 全速前进！！
    MountFly: 你也觉得飞起来很舒服吧？
    MountSwim: 要把羽毛吹干可是很麻烦的！
    MountDive: 浮起来的感觉…就像飞一样…
    SummonPuzzle: 可以帮我吗？
    SummonBattle: 到我们大显身手了！
    EnterMap: 不要发呆，走啦。
    EnterBirthPlace: 果然还是这里最让人安心…
    EnterSP: null
