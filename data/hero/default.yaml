  charData:
    characterGroup:
      id: 1
      name: 辰王朝
      icon:
      - tex_icon_group_small_01.png
      - tex_icon_group_normal_01.png
      - tex_icon_group_large_01.png
    characterRace:
      id: 7
      name: 龙人族
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      长久以来隐居于云海遥的龙人少女，从不过问世事，更是对她眼中的「尘世之民」态度冷淡。
      不过，也有流传在民间的古老故事，讲述着她如何为这片土地布云施雨，带来福祉…
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_101006_Introduce
      title: 自我介绍
      text: 我乃龙族，身居云海遥，善布云施雨之术，此番出行的目的…往后你会知晓的。
    - audioEvent: Play_VO_System_101006_EnterInterface_01
      title: 详情·1
      text: 暮则为霞，晨则为露。
    - audioEvent: Play_VO_System_101006_EnterInterface_02
      title: 详情·2
      text: 晴时唤风，阴时驱雾。
    - audioEvent: Play_VO_System_101006_EnterInterface_03
      title: 详情·3
      text: 春而登天，秋而潜渊。
    - audioEvent: Play_VO_System_101006_AboutSelf_01
      title: 关于自己·1
      text: 唔…什么？若是无事，不必勉强来搭话。很在意这个铃铛？好奇心是尔辈的通病吗。与其探求龙的秘密，不如去睡一觉，做个美梦。
    - audioEvent: Play_VO_System_101006_AboutSelf_02
      title: 关于自己·2
      text: 我也曾被一些人敬若神明。在他们眼中，似乎只要向我献上贡品，一股脑地说出心愿，自然就能风调雨顺，万事胜意…这样的人现在少多了，实乃幸事。
    - audioEvent: Play_VO_System_101006_AboutPlayer_02
      title: 关于星临者
      text: 我本以为尔辈的精力和能力都很有限，可是，却有一个即便麻烦缠身，也总能打起精神的例外存在…是因为失去了往昔记忆的缘故么？可惜了。
    - audioEvent: Play_VO_System_101006_AboutWorld_01
      title: 世界见闻·1
      text: 我并非真能操纵天气，顶多只是通过云雾，在一城一地之间降雨而已，若是要覆盖更大的范围，就有些耗神了。你说这已经很厉害了？对于尔辈来说，或许是吧。
    - audioEvent: Play_VO_System_101006_AboutWorld_02
      title: 世界见闻·2
      text: 云海遥是那片高峰连绵的群山的统称，祭祀典仪的场所也在其中。我在那里度过了漫长的时间，漫长到尔辈终其一生也难以记述。那些经历，我确实不知如何分享…
    - audioEvent: Play_VO_System_101006_Information
      title: 趣闻
      text: 我不擅长讲故事。
    - audioEvent: Play_VO_Battle_101006_UltimateSkill
      title: 必杀技
      text: 雷霆雨露，皆有天数…邪佞尽散！似尔之辈，焉能遮天？
