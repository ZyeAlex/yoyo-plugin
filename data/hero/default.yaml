  charData:
    characterGroup:
      id: 9
      name: 阿瓦利安
      icon:
      - tex_icon_group_small_07.png
      - tex_icon_group_normal_07.png
      - tex_icon_group_large_07.png
    characterRace:
      id: 2
      name: null
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      直属高等精灵王座的骑士少女，不仅能够驾驭脾气暴烈的天马洛伊莱，还可以轻松挥舞整个阿瓦利安都少有人能举起的重型长枪，在共事的同伴中拥有相当高的声望。
      「既然力气超过我们好几倍，那食量会不会也…」像这样无意的调侃也随之扩散。
      不过现在，大家都知道传言是真的了。
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_109002_Introduce
      title: 自我介绍
      text: 等一下，洛伊莱，不要闹，咻…好，乖，乖——呼…真对不起，让你看到丢人的一幕了…我叫夏儿，隶属于阿瓦利安的天马骑士团，这孩子是我的搭档洛伊莱，希望我们都能成为你可以依靠的力量，星临者。
    - audioEvent: Play_VO_System_109002_EnterInterface_01
      title: 详情·1
      text: 啊，我正想着你什么时候会来呢，星临者。
    - audioEvent: Play_VO_System_109002_EnterInterface_02
      title: 详情·2
      text: 需要我出马了？随时待命！
    - audioEvent: Play_VO_System_109002_EnterInterface_03
      title: 详情·3
      text: 看洛伊莱的反应，我就知道是你。
    - audioEvent: Play_VO_System_109002_AboutSelf_01
      title: 关于自己·1
      text: 精灵族的孩子们都对天马骑士团充满向往，但我们的日常工作可不像他们想的那么帅气。巡逻、检查、调停…是不是听起来都很琐碎？不过就算微不足道，也一定会有人因此得到帮助…这正是我选择加入的原因。
    - audioEvent: Play_VO_System_109002_AboutSelf_02
      title: 关于自己·2
      text: 那个，说起来有些不好意思，我常被人说饭量比较大…但、但是啊？！我拿的长枪其实是很重的！平常运动的消耗也很多，所以食欲旺盛些是很正常的事吧？也、也就是…五倍左右…呜。
    - audioEvent: Play_VO_System_109002_AboutPlayer_02
      title: 关于星临者
      text: 那个人就像明星一样耀眼，能够在黑暗的夜空中指引方向…希望有一天，能和那个人一起，向着我们所期望的未来携手前行…我相信，那一天不会太遥远。
    - audioEvent: Play_VO_System_109002_AboutWorld_01
      title: 世界见闻·1
      text: 阿瓦利安的书里记载了很多来自世界各地、被认为是真实存在过的、不可思议的故事。有机会的话，真想去书中所写的地方，亲眼看看漂浮在空中的水滴、无限延伸的天之塔以及永冬的花海…当然，也有些纯粹的幻想故事，比如一个没有魔法的世界——如果它真的存在于某处，我也想去感受一下——那个世界的人是如何生活的，平时又在想些什么呢？
    - audioEvent: Play_VO_System_109002_AboutWorld_02
      title: 世界见闻·2
      text: 虽然算不上有用的信息…在阿瓦利安中心区域第二条街尽头，有一家没有招牌的面包店，每天都用花园里摘的某种奇特浆果制作现烤的水果面包。听说除了那家店外，就只有北方的伊冬能找到那种浆果了。而且吃完后一段时间内都尝不到酸味…最重要的是，它真的很好吃！烤得松松软软，又融合了浆果清爽的味道，有机会的话，请一定要尝尝看！
    - audioEvent: Play_VO_System_109002_Information
      title: 趣闻
      text: 关于我的事吗…唔，还挺难为情的，想了解哪些方面呢？
    - audioEvent: Play_VO_Battle_109002_UltimateSkill
      title: 必杀技
      text: 以此身，聚此世之光。贯穿吧！这就是，我的意志！
