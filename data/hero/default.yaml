  charData:
    characterGroup:
      id: 7
      name: 洛斯兰瑟
      icon:
      - tex_icon_group_small_06.png
      - tex_icon_group_normal_06.png
      - tex_icon_group_large_06.png
    characterRace:
      id: 12
      name: 木精灵族
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      总是带着温暖的笑容，待人处事如春风拂面的木精灵少女。
      在故乡洛斯兰瑟，西芙莉雅不仅是大家眼中最优秀的新一代弓箭手，更是能托付保卫聚落之责的可靠对象。
      当她怀揣使命，踏上全新的旅途，故乡和族人的祝福亦和无处不在的清风一样，时刻长伴她的身旁。
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_107001_Introduce
      title: 自我介绍
      text: 我是来自永恒之泉的西芙莉雅，目前正在执行重要的长期任务…呃，没错，和你同行也是任务的一部分。所以…麻烦不要离开我太远！
    - audioEvent: Play_VO_System_107001_EnterInterface_01
      title: 详情·1
      text: 又要出发了吗？
    - audioEvent: Play_VO_System_107001_EnterInterface_02
      title: 详情·2
      text: 我准备好了。
    - audioEvent: Play_VO_System_107001_EnterInterface_03
      title: 详情·3
      text: 旅程，还在延续。
    - audioEvent: Play_VO_System_107001_AboutSelf_01
      title: 关于自己·1
      text: 我的过去吗？应该和其他木精灵一样，没什么特别的吧…欸，露米有和你说过什么吗？那个…从她嘴里说出来的话，多半都很夸张，请不要全相信！
    - audioEvent: Play_VO_System_107001_AboutSelf_02
      title: 关于自己·2
      text: 我曾在女王意志的指引下参与过许多任务。但离开洛斯兰瑟如此之久，还是第一次…抱歉，如果连我都不安起来的话，多少会让你有些忧虑吧。嗯？没关系吗？那就好。
    - audioEvent: Play_VO_System_107001_AboutPlayer_02
      title: 关于星临者
      text: 星临者…当然是可以依赖的同伴。嗯，和预言、使命一类的事都无关，是我自己做出的判断。
    - audioEvent: Play_VO_System_107001_AboutWorld_01
      title: 世界见闻·1
      text: 虽然我经常在外行动，但直接住进兽人聚落里面还是头一回。夏露露村的风土人情和我家乡之间的差异，就像两棵完全不同的树木…不过村民们在生活中显露出的真诚和热情，足以令我动容。
    - audioEvent: Play_VO_System_107001_AboutWorld_02
      title: 世界见闻·2
      text: 弗利斯的集市上总能发现不少新奇的东西，不愧是以文化多元而闻名的城邦。出身各异的大家能如此友好地相处，离不开管理者的努力，希望这份和谐能在未来传播到更远的地方。
    - audioEvent: Play_VO_System_107001_Information
      title: 趣闻
      text: 想听听我的经历？那可能要花点时间喔。
    - audioEvent: Play_VO_Battle_107001_UltimateSkill
      title: 必杀技
      text: 森林的——最后通牒！随风消散吧！
