  charData:
    characterGroup:
      id: 99
      name: 无阵营
      icon:
      - tex_icon_group_small_16.png
      - tex_icon_group_normal_16.png
      - tex_icon_group_large_16.png
    characterRace:
      id: 12
      name: 木精灵族
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      穿越葱郁的森林，在山谷的深处，有一座花园正矗立于此。
      正如它的守护者一样，即便经历了漫长的时光，依然恬静美丽，似乎从未改变。
      「守护之物愈是珍贵，就愈是历久弥新。」
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_107002_Introduce
      title: 自我介绍
      text: 我叫米砂，是常青之庭的守护者。嗯？「林英之冕」啊…这是我在离开洛斯兰瑟时才被赋予的称号，很少有人会这么称呼我，总感觉有些陌生。还是叫我的名字吧，这样…能让我回忆起过去的时光。
    - audioEvent: Play_VO_System_107002_EnterInterface_02
      title: 详情·1
      text: 呀，你来了。
    - audioEvent: Play_VO_System_107002_EnterInterface_03
      title: 详情·2
      text: 叶隙间的日光…让人想起遥远的过去…
    - audioEvent: Play_VO_System_107002_ChangeKibo
      title: 详情·3
      text: 来我的花园里歇歇脚吧。
    - audioEvent: Play_VO_System_107002_AboutSelf_01
      title: 关于自己·1
      text: 世界树的分枝散落在世界各地，我不过是「守护者」中的一员。精灵族的繁荣得益于世界树的恩赐，便是倾其所有也无法回报。能像这样守护着它的一枝，是我的使命，也是我的荣幸。
    - audioEvent: Play_VO_System_107002_AboutSelf_02
      title: 关于自己·2
      text: 在此度过的漫长时光里，我所做的并非只有空等，如你所见，这座花园便是我梦想实现的证明。嗯，没错，我希望能有一座足够热闹的花园——草木只是缄默，却也有许多心事呢。
    - audioEvent: Play_VO_System_107002_AboutPlayer_02
      title: 关于星临者
      text: 和那孩子接触越多，就越发觉得，所谓「预言」并不能囊括其所有…每一条生长纹都是树木独一无二的证明，星临者的旅途也是如此。只不过这一路注定曲折，愿其抵达终点之时，仍能记得出发的理由。
    - audioEvent: Play_VO_System_107002_AboutWorld_01
      title: 世界见闻·1
      text: 迁徙的鸟儿在飞向辰的时候，会避开弗利斯郊外的一片区域。据我所知曾有两位大英雄在彼处争斗不休，或许是往日的阴影太过沉重，才让那里变成一片生命不敢涉足的恐怖之地。
    - audioEvent: Play_VO_System_107002_AboutWorld_02
      title: 世界见闻·2
      text: 很久很久以前，在森林和群山之外的地方，有一座将天空与大地相连的高塔…这是我小时候从长辈那里听来的故事，不过，它究竟是传说还是历史，或许已经无从考证了…嗯？我并非对真相感到好奇，只是觉得有些遗憾。
    - audioEvent: Play_VO_System_107002_Information
      title: 趣闻
      text: 你能听到林中的絮语吗？
    - audioEvent: Play_VO_Battle_107002_UltimateSkill
      title: 必杀技
      text: 穿行林野的风…终将大地吹拂成绿茵。让生命蔓延——
