  charData:
    characterGroup:
      id: 1
      name: 辰王朝
      icon:
      - tex_icon_group_small_01.png
      - tex_icon_group_normal_01.png
      - tex_icon_group_large_01.png
    characterRace:
      id: 11
      name: 帕米族
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: |-
      「对于本大师这种奇才来说，成为天下第一的功夫大师也是迟早的事！」
      以「为巅峰对决做准备」为由，在吉逸楼蹭吃蹭…咳咳，休养生息的小帕米。
      虽然只有三脚猫功夫，但一招一式间透露出的可爱气质，让人连芃芃时不时的恶作剧都难以狠下心苛责。
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_101007_Introduce
      title: 自我介绍
      text: 自我介绍？嗯，你不认识我吗？你竟然不认识武林新贵、未来的天下第一、本功夫大师——芃芃？看来你还需要多多历练啊！以后经常在江湖上行走，就会听到本大师的名号了！
    - audioEvent: Play_VO_System_101007_EnterInterface_01
      title: 详情·1
      text: 哼哼，你来了！今天有好好练武吗？
    - audioEvent: Play_VO_System_101007_EnterInterface_02
      title: 详情·2
      text: 看看我的功夫练得怎么样！
    - audioEvent: Play_VO_System_101007_EnterInterface_03
      title: 详情·3
      text: 嘿嘿，我厉害吧？
    - audioEvent: Play_VO_System_101007_AboutSelf_01
      title: 关于自己·1
      text: 我在吃东西上可是很讲究的！像这道金银满，要炸到带一点点焦的火候才最佳。而鲜菱汤呢，就得用刚刚采摘的新鲜菱角，才能炖出那种清甜的味道。不说了，你把那盘芙蓉豆腐往我这边推推，我够不到…
    - audioEvent: Play_VO_System_101007_AboutSelf_02
      title: 关于自己·2
      text: 为了挑战天下的功夫好手，我可是走遍了整个辰王朝！不过去了这么多地方，我还是最喜欢镜花洲！这里有东西吃，有地方睡…你说这两样在哪里都可以满足吗？那也不一定吧！至少我没有遇到过比吉逸楼更好的地方！
    - audioEvent: Play_VO_System_101007_AboutPlayer_02
      title: 关于星临者
      text: 虽然那家伙的功夫水平比起我是差远了，但也还是有点儿天赋的。只要每天好好练习内功，再跟本大师学上一两招，以后应该也是可以在江湖上打出一点名声的！
    - audioEvent: Play_VO_System_101007_AboutWorld_01
      title: 世界见闻·1
      text: 雾花谷？我去过的！那里有很漂亮的花和蝴蝶，但都是有毒的，很可怕吧！而且那边的人神神秘秘的，我不建议你这样的功夫初学者自己去，万一惹出什么麻烦…我可救不了你哦！
    - audioEvent: Play_VO_System_101007_AboutWorld_02
      title: 世界见闻·2
      text: 虽然还没有去过太远的地方…但我在巅峰对决打响名号之后，肯定会有很多外国的习武者慕名来向我挑战！到时候，我就可以趁机去别的地方看看了！
    - audioEvent: Play_VO_System_101007_Information
      title: 趣闻
      text: 江湖上也是流传着不少关于本大师的传说的！
    - audioEvent: Play_VO_Battle_101007_UltimateSkill
      title: 必杀技
      text: 所谓功夫…就是——稳！准！狠！看我的厉害！
  battle:
    name: 芃芃
    Dodge: null
    QiboCapture: 怎么样？要不要跟我学两招？
