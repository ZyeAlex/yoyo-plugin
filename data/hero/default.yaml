    GreetingMorning: 早上好，附近好安静啊…想陪我去空中散散心吗？
    GreetingAfternoon: 已经这个时间了，别忘了休息一下。咦？我吗？我不要紧的，谢谢你。
    GreetingEvening: 欸？啊，晚上好。不…我没有在发呆，只是有点饿，一点点。
    IdleWeather_01: 嗯，真是个好天气，该打理一下洛伊莱的羽毛了。
    IdleWeather_02: …这样的天气，都不敢让那孩子尽情飞翔了。
    TreasureFound_01: 会是谁遗留在这里的呢？
    TreasureFound_02: 洛伊莱，你发现什么了吗？
    TreasureGet_01: 收获不错，犒劳一下自己吧。
    TreasureGet_02: 不错的发现呢，对吧洛伊莱？
    TreasureGet_03: 可以补充一下物资储备了。
    ResourceFound_01: 嗯…能找到些什么吗？
    ResourceFound_02: 好像可以采集到有用的东西。
    ResourceGet_01: 旅途还很长，要好好利用才行。
    ResourceGet_02: 或许能拿去厨房…我是说，仓库。
    ResourceGet_03: 只有这些了吗？要是再多点就好了。
    WorldPuzzleSolve: 这里是…好厉害。
    NormalPuzzleSolve: 解决了吗？那就好。
    ItemRequired_01: 没有反应呢，是还缺了什么吗？
    ItemRequired_02: 看来是遗漏了什么关键的东西呢…
    Switch: 由我来做开路先锋。
    Scenery: 那里看起来很适合发动冲锋…
    LandMark: 这种结构…还挺有趣的。
    NormalEnemy: 那边…没问题吗？
    StrongEnemy: 有危险，到我身后来。
    FoundbyEnemy: 它们追过来了，没关系，已经做好准备了。
    EscapefromEnemy: 呼，是放弃了吗？
    BackHPHigh: 大家都没怎么受伤，太好了。
    BackHPMed: 嗯，不要紧，已经结束了。
    BackHPLow: 呜，又是一场苦战…但总算是赢了。
    BackFailed: 又一次…留下遗憾了吗？
    VictoryMVP: 这份力量，足以令敌人胆寒。
    VictoryAudience: 辛苦了，收尾就交给我吧。
    Victory: 一直积攒胜利，我们必将…
    HealWarning: 不要勉强自己，还是休息一下比较好。
    QuestTake: 如果我能帮上忙的话。
    QuestComplete_01: 这样一来，应该就可以了。
    QuestComplete_02: 圆满结束，总算能安心了。
    Dash_001: 咻（语气词）
    Dash_002: 哈（语气词）
    Dash_003: 要加快步伐了哦。
    Jump_001: 嘿（语气词）
    Jump_002: 呀（语气词）
    Jump_003: 呼（语气词）
    Leap_001: 呼咻（语气词）
    Leap_002: 羽翼相伴。
    MountRide: 嘿呀！
    MountFly: 天马骑士，与天空同在。
    MountSwim: 借助流水的力量。
    MountDive: 水下和天上…有相似的感觉。
    SummonPuzzle: 可以再麻烦你吗？
    SummonBattle: 随我冲锋！
    EnterMap: 走吧。如果感到不安，就请跟在我的身后。
    EnterBirthPlace: 欢迎来到阿瓦利安，「旅者所抵达之处」。
    EnterSP: null
    UnLockTeleport: 这样一来，行动就可以加快了。
    UnLockTower: 从这里俯瞰就一览无余了呢。
    QiboCapture: 向我敞开你的心扉吧。
