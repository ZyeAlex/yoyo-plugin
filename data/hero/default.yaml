    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: 记忆一片空白、身世成谜的少女，即便如此依然非常自然地展开了对陌生世界的探索，有着超越常人的坚定信念和相当大条的神经。在冒险中尝试寻找自己的身世与生存的意义，不知不觉间，她的身边也聚集起了众多可靠的伙伴。
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_199001_EnterInterface_01
      title: 详情·1
      text: 嗯~忙里偷闲也是很重要的。
    - audioEvent: Play_VO_System_199001_EnterInterface_02
      title: 详情·2
      text: 让「星辰」降落。
    - audioEvent: Play_VO_System_199001_EnterInterface_03
      title: 详情·3
      text: 旅途，尚未抵达终点。
    - audioEvent: Play_VO_System_199001_AboutWorld_01
      title: 世界见闻·1
      text: 从睁开眼的那一刻起，纷沓而至的人们便带来了各种各样关于我命运的预言…不，我不打算承认那就是我的命运。
    - audioEvent: Play_VO_System_199001_AboutWorld_02
      title: 世界见闻·2
      text: 「肉要大口吃才好吃」、「狩猎归来要供奉祖先」…这些都好理解，但到底为什么要「通过决斗来表明心意」啊…？
    - audioEvent: Play_VO_Battle_199001_UltimateSkill
      title: 必杀技
      text: 群星所引…星辉闪烁——回应我的意志！
