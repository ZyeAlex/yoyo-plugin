  charData:
    characterGroup:
      id: 99
      name: 无阵营
      icon:
      - tex_icon_group_small_16.png
      - tex_icon_group_normal_16.png
      - tex_icon_group_large_16.png
    characterRace:
      id: 99
      name: 未知
    cvName: ????
    cv_chs: ????
    cv_jp: ????
    cv_en: ????
    cv_kr: ????
    cv_cht: ????
    introduction: 记忆一片空白、身世成谜的少年，即便如此依然非常自然地展开了对陌生世界的探索，有着超越常人的坚定信念和相当大条的神经。在冒险中尝试寻找自己的身世与生存的意义，不知不觉间，他的身边也聚集起了众多可靠的伙伴。
    characterBirthday: ?月?日
    characterVoice:
    - audioEvent: Play_VO_System_199002_EnterInterface_01
      title: 详情·1
      text: 稍微放松一下，不是坏事。
    - audioEvent: Play_VO_System_199002_EnterInterface_02
      title: 详情·2
      text: 让「星辰」降落。
    - audioEvent: Play_VO_System_199002_EnterInterface_03
      title: 详情·3
      text: 旅途，尚未抵达终点。
    - audioEvent: Play_VO_System_199002_AboutWorld_01
      title: 世界见闻·1
      text: 从睁开眼的那一刻起，纷沓而至的人们便带来了各种各样关于我命运的预言…不，我不打算承认那就是我的命运。
    - audioEvent: Play_VO_System_199002_AboutWorld_02
      title: 世界见闻·2
      text: 这里的风俗，逐渐熟悉了。一起烤肉，代表着分享幸福；向祖先供奉猎物，代表着对庇佑的感激；不过，激烈搏斗居然代表着对友谊的认可…这一点令人困惑。
    - audioEvent: Play_VO_Battle_199002_UltimateSkill
      title: 必杀技
      text: 群星所引…星辉闪烁——回应我的意志！
