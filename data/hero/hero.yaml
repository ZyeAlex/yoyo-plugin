  unitId: 104006
  voice:
    - id: 10400101
      title: 自我介绍
      text: 源氏一族的临时代理，源千代——现在，不过是一介浪人而已。为了家族交托的使命，和这把刀一起踏上了旅程。嗯？兴趣爱好？自我介绍也包括这一项吗…那样的话，泡茶或者插花吧，会让人感觉心情很放松呢。
      audioEvent: Play_VO_System_104001_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400101_8_0
    - id: 10400102
      title: 详情·1
      text: 冷静的思考，便是我的制胜王道。
      audioEvent: Play_VO_System_104001_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400102_8_0
    - id: 10400103
      title: 详情·2
      text: 刀皆有其锋芒，人亦如此。
      audioEvent: Play_VO_System_104001_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400103_8_0
    - id: 10400104
      title: 详情·3
      text: 必不辱没源氏一族的名誉。
      audioEvent: Play_VO_System_104001_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400104_8_0
    - id: 10400105
      title: 关于自己·1
      text: 我喜欢井井有条的生活，并非「每一天都很忙碌」，而是一切都可以有序地推进下去。当计划被意外打乱时，也能通过冷静地思考，将事态发展引导回预期的方向——当然，如果之后遭遇了失败，我会认真检讨的。
      audioEvent: Play_VO_System_104001_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400105_8_0
    - id: 10400106
      title: 关于自己·2
      text: 身为源氏之女，除了战斗的技巧外，还要从小接受关于礼仪和数字计算的教育。前者有助于塑造自己的内心，后者则能让我更加理性地认知这个世界。小时候沉浸于学习之中的状态，至今依然让我感到无比怀念。
      audioEvent: Play_VO_System_104001_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400106_8_0
    - id: 10400107
      title: 关于星临者
      text: 在制定下一步的计划时，脑海中会不由自主地浮现出那个人的模样。看来，作为伙伴，我们确实一同经历了许多。拜星临者所赐，经历了这趟旅途之后，我想要尝试的东西又多了不少。呼呼，真是不可思议的人呢，哪怕是身为鬼人的我都有些羡慕。
      audioEvent: Play_VO_System_104001_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400107_8_0
    - id: 10400108
      title: 世界见闻·1
      text: 离开故乡之后，我选择了经由联邦的领土向南部前行。路过木精灵们的居所时，那棵在漫长时光中一直佑护着洛斯兰瑟的巨树给我留下了深刻的印象，精灵的故乡永远守望着它的孩子…但可惜，并不是所有飞离的鸟儿都能回到曾经栖息的枝头。
      audioEvent: Play_VO_System_104001_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400108_8_0
    - id: 10400109
      title: 世界见闻·2
      text: 我曾在阿瓦利安生活过一段时间，和高等精灵们交流的过程中也发生了许多有意思的事情。比如，对方认为我所穿的服饰设计很独特，代表了一种全新的时尚风格…这就是所谓的「视角不同，感受也不同」吧？
      audioEvent: Play_VO_System_104001_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400109_8_0
    - id: 10400110
      title: 趣闻
      text: 身为合作伙伴，理应互相了解。
      audioEvent: Play_VO_System_104001_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400110_8_0
    - id: 10400111
      title: 必杀技
      text: 不净之物…当消逝于此！散！
      audioEvent: Play_VO_Battle_104001_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10400111_8_0
