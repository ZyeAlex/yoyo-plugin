  unitId: 104004
  voice:
    - id: 10800101
      title: 自我介绍
      text: 我叫做忒拉拉，在夏露露村长大，是村子里最厉害的猎人！既然成为了伙伴，那以后就让我来罩着你吧！怎么样，是不是已经开始崇拜上我了？
      audioEvent: Play_VO_System_108001_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800101_8_0
    - id: 10800102
      title: 详情·1
      text: 呀吼！又见面啦~
      audioEvent: Play_VO_System_108001_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800102_8_0
    - id: 10800103
      title: 详情·2
      text: 见到你真是太好啦！
      audioEvent: Play_VO_System_108001_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800103_8_0
    - id: 10800104
      title: 详情·3
      text: 有我罩着你呢！
      audioEvent: Play_VO_System_108001_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800104_8_0
    - id: 10800105
      title: 关于自己·1
      text: 身体健康的秘诀？当然是「多吃肉、勤锻炼」啊！我每天都会去村子外面巡视三圈、帮驮兽搬运货物、到森林里狩猎、回来后再大吃一顿！这样吧，明天开始你就跟着我一起锻炼，把之前缺少的运动量都补回来！
      audioEvent: Play_VO_System_108001_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800105_8_0
    - id: 10800106
      title: 关于自己·2
      text: 冲动？可是想要解决问题，总得先动起来才行吧？况且只要有一个人能站出来，那其他人就能从中获得一点勇气吧？欸…你那是什么眼神啊！难道你一直觉得我纯粹就是个笨蛋吗？！
      audioEvent: Play_VO_System_108001_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800106_8_0
    - id: 10800107
      title: 关于星临者
      text: 那家伙的确很奇怪，明明还没搞清自己的处境，却愿意拼尽全力保护其他人，这份勇气就连我都忍不住有些羡慕。更重要的是，正因为遇到了星临者，我才下定决心要出去转转…看来变化也不一定是什么坏事嘛！
      audioEvent: Play_VO_System_108001_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800107_8_0
    - id: 10800108
      title: 世界见闻·1
      text: 山谷里的那个大家伙，出村的时候一眼就能看到了吧！巨大的、清澈的、绽放着光芒的蓝色水晶。我经常带着乌尔一起去那附近打猎，水晶附近的动物都十分活跃呢！啊，对了，如果你想试着下水，也可以叫上我一起哦！
      audioEvent: Play_VO_System_108001_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800108_8_0
    - id: 10800109
      title: 世界见闻·2
      text: 我才不会羡慕那些长着翅膀的家伙，只要我跳得够高，就能看到和他们眼中一样的景色。
      audioEvent: Play_VO_System_108001_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800109_8_0
    - id: 10800110
      title: 趣闻
      text: 咦，想要知道我的事吗？好啊，先从哪里开始说起呢？
      audioEvent: Play_VO_System_108001_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800110_8_0
    - id: 10800111
      title: 必杀技
      text: 碍事的家伙，统统打飞…这下知道痛了吧？
      audioEvent: Play_VO_Battle_108001_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800111_8_0
