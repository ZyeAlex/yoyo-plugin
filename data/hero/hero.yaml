  introduction: 来自断风磐的翼人弓手，对自己的出身所属感到无比自豪。\n尽管在族人看来，尚在成长中的她并不需要承担过多责任，但米蒂依然在训练之余坚持每天巡逻和狩猎，强度甚至比族中的资深战士还要高。\n「就、就算不用飞的，我也一样会成为最棒的战士！…绝对。」
