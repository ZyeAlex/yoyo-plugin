  introduction: 直属高等精灵王座的骑士少女，不仅能够驾驭脾气暴烈的天马洛伊莱，还可以轻松挥舞整个阿瓦利安都少有人能举起的重型长枪，在共事的同伴中拥有相当高的声望。\n「既然力气超过我们好几倍，那食量会不会也…」像这样无意的调侃也随之扩散。\n不过现在，大家都知道传言是真的了。
