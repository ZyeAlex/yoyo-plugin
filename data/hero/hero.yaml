  voice:
    - id: 10900101
      title: 自我介绍
      text: 哈库茵剑舞继承人，聆剑之心，风雷降生，这些都是我，但我更希望你能叫我末音，因为我们是志同道合的伙伴。哈库茵家族的雇员遍布全世界，无论你身处何处都能得到帮助，至于价格，我还没想好，就算你先欠我三个愿望好了。
      audioEvent: Play_VO_System_109001_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900101_8_0
    - id: 10900102
      title: 详情·1
      text: 聆听剑风划过的声音。
      audioEvent: Play_VO_System_109001_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900102_8_0
    - id: 10900103
      title: 详情·2
      text: 我是哈库茵家族的继承人，也是末音。
      audioEvent: Play_VO_System_109001_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900103_8_0
    - id: 10900104
      title: 详情·3
      text: 既然是志同道合的伙伴，让你多了解一些也无妨。
      audioEvent: Play_VO_System_109001_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900104_8_0
    - id: 10900105
      title: 关于自己·1
      text: 阿瓦利安有四位剑技巅峰，其中有两位便是我的父母，父亲教导的剑技刚硬且勇往直前，母亲教导的剑技轻盈中潜藏杀意。但我的双剑既无强固，亦不蛰伏，我要走我的路。
      audioEvent: Play_VO_System_109001_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900105_8_0
    - id: 10900106
      title: 关于自己·2
      text: 有时说话太一板一眼了？真是的…你以为我每天要处理多少份来自普罗米利亚各地的回函，要是不聚精会神一点，肯定会有所纰漏。倒不如说，你什么时候能答应我帮忙处理一些事务呢，星临者大人。
      audioEvent: Play_VO_System_109001_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900106_8_0
    - id: 10900107
      title: 关于星临者
      text: 无论是能力，还是思维韬略，毫无疑问都是上上之才，要是我们哈库茵家族能够得到星临者的帮助，家族的实力必然会有所加强，这就是星临者的不可替代性。
      audioEvent: Play_VO_System_109001_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900107_8_0
    - id: 10900108
      title: 世界见闻·1
      text: 洛斯兰瑟的沿海有一片巨大的黄金海岸，据说只有在那才能喝到世界上最好喝的冷饮，那群守旧派虽然思维落后，不过在研究这类商品上倒是颇有创意。我们虽然掌握着更多的知识，但仍需不断拓宽视野啊。
      audioEvent: Play_VO_System_109001_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900108_8_0
    - id: 10900109
      title: 世界见闻·2
      text: 家族里的老人会传一个关于塔尔西斯的诡异故事，那片红色沙漠的真相，似乎是上一纪元爆发的超烈度决战，无数生灵留下的痕迹将那片沙漠染红。不过类似这样的故事哪里都有，也不能完全相信。
      audioEvent: Play_VO_System_109001_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900109_8_0
    - id: 10900110
      title: 趣闻
      text: 想了解我的事？…让你看看也无妨。
      audioEvent: Play_VO_System_109001_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900110_8_0
    - id: 10900111
      title: 必杀技
      text: 聆听这——剑雷华章，直至消散！
      audioEvent: Play_VO_Battle_109001_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10900111_8_0
