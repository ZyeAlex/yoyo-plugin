  voice:
    - id: 11100101
      title: 自我介绍
      text: 断风磐第十七任霍克加尔，法兰塔。族人们受你照顾了，谢谢。还有什么想知道的吗？想更了解我…？不，不是不愿意，只是我一时间想不到还能说什么。我记得大家在介绍自己的时候一般会提到爱好之类的…嗯，我喜欢吃辣的东西…抱歉，我可能真的不太擅长这些，但如果你需要我的力量，可以随时来找我。
      audioEvent: Play_VO_System_111001_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100101_8_0
    - id: 11100102
      title: 详情·1
      text: 找我吗？我知道了。
      audioEvent: Play_VO_System_111001_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100102_8_0
    - id: 11100103
      title: 详情·2
      text: 嗯，我在。
      audioEvent: Play_VO_System_111001_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100103_8_0
    - id: 11100104
      title: 详情·3
      text: 风捎来了你的声音。
      audioEvent: Play_VO_System_111001_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100104_8_0
    - id: 11100105
      title: 关于自己·1
      text: 关于我自己的事吗…嗯，大家是因为战斗的实力才推选我成为霍克加尔的，但当我接下这个位置，开始承担做决策的责任后，才真正感受到我的师傅当初背负的压力。抱歉，我尽说这些，你可能也会觉得我是个无聊的人吧。
      audioEvent: Play_VO_System_111001_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100105_8_0
    - id: 11100106
      title: 关于自己·2
      text: 之前我用过一阵弓箭，后来就换成了长枪。毕竟，我在族人中速度还算快，用枪可以最大限度发挥翅膀的机动力。至于近身战更容易受伤…身为霍克加尔，这不是我应该顾虑的事情。
      audioEvent: Play_VO_System_111001_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100106_8_0
    - id: 11100107
      title: 关于星临者
      text: 星临之人啊…那些不可思议的知识和能力，或许正是来自天空的眷顾吧。不过，即便抛开这个称呼，那个人也一定能像鹰神一样，凭借自己的羽翼飞向更高更远的世界。
      audioEvent: Play_VO_System_111001_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100107_8_0
    - id: 11100108
      title: 世界见闻·1
      text: 我们的成人礼你应该有所了解…听说山谷外的其他地方也有类似的传统。他们跳下去的时候还是「孩童」，而起飞时便已是「成人」。
      audioEvent: Play_VO_System_111001_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100108_8_0
    - id: 11100109
      title: 世界见闻·2
      text: 翼人向往天空，渴望展翅飞翔至云端之上，传说中那是鹰神所在的地方。但不知为何，当星星坠落时，我却隐约感受到了…天空之外，仍有阴霾。
      audioEvent: Play_VO_System_111001_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100109_8_0
    - id: 11100110
      title: 趣闻
      text: 有想知道的事就问吧，我不会对你隐瞒。
      audioEvent: Play_VO_System_111001_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100110_8_0
    - id: 11100111
      title: 必杀技
      text: 你应畏惧迫近的风暴…坠落吧！天空不属于你。
      audioEvent: Play_VO_Battle_111001_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 11100111_8_0
