  unitId: 103004
  voice:
    - id: 10800201
      title: 自我介绍
      text: 我叫做璐璐卡，是夏露露村中狼族的一员，负责村里的祭祀之职。虽然资历尚浅，但我会不断努力的…那个，无论何时需要借助我的力量，我都会尽快赶来的！嗯，请多多关照了。
      audioEvent: Play_VO_System_108002_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800201_8_0
    - id: 10800202
      title: 详情·1
      text: 烦恼的话，可以随时向我倾诉。
      audioEvent: Play_VO_System_108002_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800202_8_0
    - id: 10800203
      title: 详情·2
      text: 为了守护大家，我会竭尽全力。
      audioEvent: Play_VO_System_108002_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800203_8_0
    - id: 10800204
      title: 详情·3
      text: 无论何时，思念总将我们联系在一起…
      audioEvent: Play_VO_System_108002_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800204_8_0
    - id: 10800205
      title: 关于自己·1
      text: 粉色的头发…是天生就这个颜色的，尽管和村里的大家都不太一样，但我不觉得是什么坏事喔？姐姐也说过，她很喜欢这个颜色，看起来就像晚霞一样。唔…说这话的时候她有些犹豫来着，我猜她心里想的其实是半熟烤肉之类的比喻吧？
      audioEvent: Play_VO_System_108002_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800205_8_0
    - id: 10800206
      title: 关于自己·2
      text: 我的本职工作是萨满，同时也负责给村里人治病，要说草药的知识是哪里来的…一部分是村子里流传下来的，还有一部分是山谷中的动物们告诉我的，剩下的就是……一点点尝试得出来的吧。多亏了萨满的能力，草药中少量的毒性也无碍于我。
      audioEvent: Play_VO_System_108002_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800206_8_0
    - id: 10800207
      title: 关于星临者
      text: 那个人用不可思议的知识和能力，给我提供了扫清心中迷惘的机会。多亏了那个人的努力，困扰我们许久的问题才得以解决。星临者阁下，请允许我为你的前路献上祈愿，愿你的未来如星辰一样闪耀。
      audioEvent: Play_VO_System_108002_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800207_8_0
    - id: 10800208
      title: 世界见闻·1
      text: 万物之灵一直行走在这片大地上，它们也是自然的一部分，赐予我们勇气和智慧，教导我们保持谦逊和尊重。声音、舞步、手势、思念，都是与其沟通的语言——没错，所谓的沟通方式并没有绝对的对错，我惯于使用祝词与手势，你要不要试试用鼓点和舞步来通灵呢？
      audioEvent: Play_VO_System_108002_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800208_8_0
    - id: 10800209
      title: 世界见闻·2
      text: 听村长爷爷说，在遥远的北方有三座巨大的山脉，每座山脉的最高峰上都住着一条龙，和与我们所认知的不同，那些山脉上的龙是足以撼动世界的、龙族的支配者…虽然话是这么说，不过村长爷爷的故事大概只有一半可信吧，嗯。
      audioEvent: Play_VO_System_108002_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800209_8_0
    - id: 10800210
      title: 趣闻
      text: 心灵会指引你走向真正的自己。
      audioEvent: Play_VO_System_108002_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800210_8_0
    - id: 10800211
      title: 必杀技
      text: 悠久的森之灵啊…请借我您的力量！守护生命的延续！
      audioEvent: Play_VO_Battle_108002_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800211_8_0
