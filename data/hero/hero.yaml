  introduction: 记忆一片空白、身世成谜的少年，即便如此依然非常自然地展开了对陌生世界的探索，有着超越常人的坚定信念和相当大条的神经。在冒险中尝试寻找自己的身世与生存的意义，不知不觉间，他的身边也聚集起了众多可靠的伙伴。
