  introduction: 「对于本大师这种奇才来说，成为天下第一的功夫大师也是迟早的事！」\n以「为巅峰对决做准备」为由，在吉逸楼蹭吃蹭…咳咳，休养生息的小帕米。\n虽然只有三脚猫功夫，但一招一式间透露出的可爱气质，让人连芃芃时不时的恶作剧都难以狠下心苛责。
