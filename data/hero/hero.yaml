  voice:
    - id: 10100301
      title: 自我介绍
      text: 没错！我就是寒悠悠。哎呀，别管我是从哪儿来的啦，如果你打听到那些古代藏宝之地的线索，一定要叫上我喔！什么机关暗器，陷阱埋伏，统统交给我来破解吧！
      audioEvent: Play_VO_System_101003_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100301_8_0
    - id: 10100302
      title: 详情·1
      text: 别那么严肃嘛！
      audioEvent: Play_VO_System_101003_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100302_8_0
    - id: 10100303
      title: 详情·2
      text: 小瞧我可是会吃亏的~
      audioEvent: Play_VO_System_101003_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100303_8_0
    - id: 10100304
      title: 详情·3
      text: 看，我的新作品哦~
      audioEvent: Play_VO_System_101003_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100304_8_0
    - id: 10100305
      title: 关于自己·1
      text: 怎么？没想到我很擅长砍价？哼~这可不是钱的问题，身为机关大师，要是连真实价值都判断不出来，那就是大大的失职！
      audioEvent: Play_VO_System_101003_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100305_8_0
    - id: 10100306
      title: 关于自己·2
      text: 制造机关和破除机关都很有意思！不过，要是遇到那种没有什么巧思，纯粹是为难而难的设计，我宁可直接炸掉也不想在它上面浪费时间。
      audioEvent: Play_VO_System_101003_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100306_8_0
    - id: 10100307
      title: 关于星临者
      text: 星临者所面对的局面，或许比我见过的任何机关都要复杂…到底是什么在驱动着那家伙前进的呢？我很好奇…我很好奇！
      audioEvent: Play_VO_System_101003_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100307_8_0
    - id: 10100308
      title: 世界见闻·1
      text: 巍峨的城墙一看就能让人产生安全感对吧？不过，要是我说的话，还是能跑能跳，自己就会在街上巡逻的石狮子更厉害一点！
      audioEvent: Play_VO_System_101003_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100308_8_0
    - id: 10100309
      title: 世界见闻·2
      text: 我曾听说，各种机关的设计，利于人谓之巧，不利于人谓之拙。那么，大自然的鬼斧神工，就该是「大巧若拙」了吧…
      audioEvent: Play_VO_System_101003_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100309_8_0
    - id: 10100310
      title: 趣闻
      text: 愿意帮我保密的话，多告诉你一些事也无妨~
      audioEvent: Play_VO_System_101003_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100310_8_0
    - id: 10100311
      title: 必杀技
      text: 前有绝景，敬请见证！咻——砰啪！这样的烟花，没见过吧？
      audioEvent: Play_VO_Battle_101003_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10100311_8_0
