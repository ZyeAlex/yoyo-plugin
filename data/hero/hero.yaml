    elementiconography: UI/Page/PetCatalog/tex_petillustrative_bg_feng_Info.png,UI/Page/PetCatalog/tex_petillustrative_bg_feng_Icon.png
  unitId: 104017
  voice:
    - id: 10200101
      title: 自我介绍
      text: 咳咳…我叫莉莉，是一名见习骑士，目前正在游历修行中。虽然资历尚浅，但我会将骑士守则里的内容贯彻到底！所有，如果有需要帮忙的地方，就请告诉我吧，很乐意为你效劳！
      audioEvent: Play_VO_System_102001_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200101_8_0
    - id: 10200102
      title: 详情·1
      text: 嗨嗨，来找我了吗~好开心~
      audioEvent: Play_VO_System_102001_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200102_8_0
    - id: 10200103
      title: 详情·2
      text: 接下来的安排？等我看看日程表！
      audioEvent: Play_VO_System_102001_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200103_8_0
    - id: 10200104
      title: 详情·3
      text: 见习骑士莉莉，为您效劳！
      audioEvent: Play_VO_System_102001_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200104_8_0
    - id: 10200105
      title: 关于自己·1
      text: 我的枪术成长略显缓慢，在疗愈方面倒是有一些心得…这就说明，我要在珍惜天赋的同时，更加努力地锻炼枪术！成为一名既能站在同伴身前帅气地打倒怪物、又能保护大家不受伤痛侵扰的优秀骑士！
      audioEvent: Play_VO_System_102001_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200105_8_0
    - id: 10200106
      title: 关于自己·2
      text: 战斗的理由？嘿嘿，因为骑士的长枪看起来真的很帅气！欸？这个理由已经说服不了你了吗？嗯…我希望修行的旅途能一直一直延伸下去，最终我们都会抵达彼此想去的地方。在此期间，战斗是避免不了的，对吧？
      audioEvent: Play_VO_System_102001_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200106_8_0
    - id: 10200107
      title: 关于星临者
      text: 那个人的过去确实很神秘呢，不过，我是不会去刨根问底的啦，毕竟，谁都会有一些小秘密的嘛。
      audioEvent: Play_VO_System_102001_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200107_8_0
    - id: 10200108
      title: 世界见闻·1
      text: 弗利斯的「古战场」啊，虽然现在只剩下残留的痕迹，但也能想象当年的大战有多么惊天动地…我的心也跟着一起扑通扑通直跳呢！
      audioEvent: Play_VO_System_102001_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200108_8_0
    - id: 10200109
      title: 世界见闻·2
      text: 如果有机会，我还想去北边的艾登兰游历一番。那可是骑士的起源之地啊！比起在历史书上学到的东西，果然还是亲眼见证更能带来收获，对吧？
      audioEvent: Play_VO_System_102001_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200109_8_0
    - id: 10200110
      title: 趣闻
      text: 你也喜欢听故事吗？好，这次就由我来说几个吧。
      audioEvent: Play_VO_System_102001_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200110_8_0
    - id: 10200111
      title: 必杀技
      text: 该直面一切了…风暴啊，向我屈膝！呼…我做到了。
      audioEvent: Play_VO_Battle_102001_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10200111_8_0
