  unitId: 103007
  voice:
    - id: 10800301
      title: 自我介绍
      text: 我叫米蒂。看到这对翅膀了吧？没错，我是翼人族的一员，任何猎物都逃不开我们的追捕。先说好，要我帮忙可以，但我可没打算和你搞好关系。
      audioEvent: Play_VO_System_108003_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800301_8_0
    - id: 10800302
      title: 详情·1
      text: 翼人的战士，不会轻易退缩！
      audioEvent: Play_VO_System_108003_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800302_8_0
    - id: 10800303
      title: 详情·2
      text: 好好学着吧你！
      audioEvent: Play_VO_System_108003_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800303_8_0
    - id: 10800304
      title: 详情·3
      text: 我的弓箭可是百里挑一！
      audioEvent: Play_VO_System_108003_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800304_8_0
    - id: 10800305
      title: 关于自己·1
      text: 该开始今天的狩猎了！猎物在哪里？我现在怎么知道啦，所以这才要去找嘛！真是的，像你这样的外行…要学习的地方还有很多，乖乖跟上就是了。
      audioEvent: Play_VO_System_108003_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800305_8_0
    - id: 10800306
      title: 关于自己·2
      text: 翅膀上的伤？哼，只是稍微擦破了一点而已，能有什么大不了嘛，早就已经愈合了…不、不过，还算你有心，能注意到这一点。好了好了，总之不用担心，我没问题的！
      audioEvent: Play_VO_System_108003_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800306_8_0
    - id: 10800307
      title: 关于星临者
      text: 虽然没有翅膀，但脑子还是挺好使的，能想出很多解决问题的办法…这、这才不是夸奖！只是作为观察的对象进行分析罢了！
      audioEvent: Play_VO_System_108003_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800307_8_0
    - id: 10800308
      title: 世界见闻·1
      text: 山谷里的风是我们获取情报的途径之一。在不同的高度，风所传达的信息也是不一样的。你出现在山谷里的那天，我们自然也注意到了风中不寻常的波动，怎么样，翼人的敏锐是不是远超你的想象？
      audioEvent: Play_VO_System_108003_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800308_8_0
    - id: 10800309
      title: 世界见闻·2
      text: 那个，为了你好，我再多说两句。经过森林时多留意脚下，尤其是某些湿答答的地方，那里头的蘑菇还会动！恶…想到就浑身难受…
      audioEvent: Play_VO_System_108003_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800309_8_0
    - id: 10800310
      title: 趣闻
      text: 干、干嘛一直盯着我…我可没什么心虚的事情！
      audioEvent: Play_VO_System_108003_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800310_8_0
    - id: 10800311
      title: 必杀技
      text: 接好了…这可是来自天空的礼物——！雷电强袭！
      audioEvent: Play_VO_Battle_108003_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10800311_8_0
