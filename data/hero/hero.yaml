  introduction: 积极、乐观、开朗的少女骑士，身姿如初绽的洁白花朵一般无邪。\n「虽然还只是见习骑士，但只要沿着道路前进下去，一定会有所成长的！」\n擦去盾牌上的污迹，抖落肩上的灰尘，少女举起长枪，枪尖和她的金发一般耀眼。
