      skillDescribe: 【普攻】进行至多三段的普通攻击，分别射出2/3/4枚箭矢，造成最多{0}攻击力的<color=#9665ab>雷属性物理伤害</color>。\n\n【重击】对敌方造成{1}攻击力的<color=#9665ab>雷属性物理伤害</color>，蓄力时间越长，造成的伤害量越高。\n若蓄力提前施放，则射出1枚箭矢，造成{2}攻击力的<color=#9665ab>雷属性物理伤害</color>。命中敌方后生成半径2米的弱闪电球，持续2秒。弱闪电球每次放电将对范围内敌方造成{3}攻击力的<color=#9665ab>雷属性物理伤害</color>，最多放电6次。\n若蓄力满后施放，则射出1枚箭矢，造成{4}攻击力的<color=#9665ab>雷属性物理伤害</color>，并附加1枚雷属性失序印记。命中敌方后生成半径2米的闪电球，持续2秒。闪电球每次放电将对范围内敌方造成{5}攻击力的<color=#9665ab>雷属性物理伤害</color>，最多放电12次。\n若米蒂处于「蓄电」状态，满蓄力重击时将会分散射出三枚箭矢，命中敌方时均可形成闪电球。\n\n【闪击】造成{6}攻击力的<color=#9665ab>雷属性物理伤害</color>。\n\n【跃击】造成{7}攻击力的<color=#9665ab>雷属性物理伤害</color>。
      skillSpecialDesc: 无数次练习，拉弓放箭早已成为身体的本能。
