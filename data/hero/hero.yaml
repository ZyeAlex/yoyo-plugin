      skillDescribe: 【普攻】进行至多五段的普通攻击，对敌方造成最多{0}攻击力的<color=#dd6f67>火属性物理伤害</color>。第五段攻击命中敌方时，将为自身附加「炽腾」状态，持续10秒。在该状态下重击可触发派生攻击，触发后清除状态。\n\n【重击】造成{1}攻击力的<color=#dd6f67>火属性物理伤害</color>。\n「炽腾」状态下长按重击可触发派生攻击，触发后清除状态。\n重击派生会对敌方进行多段攻击，每击均会为自己恢复等同于自身6%攻击力的生命值，并对敌方造成最多{2}攻击力的<color=#dd6f67>火属性物理伤害</color>。派生攻击结束动作命中目标时，可消耗1枚风/土/木属性失序印记，并使伤害提升{3}。\n重击派生过程中韧性效果提升。若过早停止长按，则无法触发重击派生，且消耗「炽腾」状态。\n\n【闪击】造成{4}攻击力的<color=#dd6f67>火属性物理伤害</color>。\n\n【跃击】造成{5}攻击力的<color=#dd6f67>火属性物理伤害</color>。
