      skillDescribe: 【普攻】进行至多五段的普通攻击，对敌方目标造成最多{0}攻击力的<color=#ad7d14>地属性物理伤害</color>。\n\n【重击】对敌方目标造成<color=#ad7d14>地属性物理伤害</color>，蓄力时间越长造成的伤害越高。蓄力过程中抗击力提升，最多可二段蓄力。\n若蓄力后立刻施放，则造成总伤害{1}的<color=#ad7d14>地属性物理伤害</color>；\n若蓄力满一段后施放，则造成总伤害{2}的<color=#ad7d14>地属性物理伤害</color>；\n若蓄力满二段后施放，则造成总伤害{3}的<color=#ad7d14>地属性物理伤害</color>。\n蓄力满二段命中敌方目标时，则消耗1枚地/木/风属性调谐，并额外造成{4}攻击力的<color=#ad7d14>地属性物理伤害</color>，且这次架势破坏倍率提升。\n\n【闪击】造成{5}攻击力的<color=#ad7d14>地属性物理伤害</color>。\n\n【跃击】造成{6}攻击力的<color=#ad7d14>地属性物理伤害</color>。
      skillSpecialDesc: 除非想切身体会一下锤镐的重量，否则永远不要挡在诺诺和诺诺想要的东西中间。
