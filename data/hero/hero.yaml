  introduction: 肩负着沉重的使命、离开故乡独自漂泊的武士少女，有着与外表年龄不符的成熟心智，温柔而理性。\n随身的佩刀陪伴她开辟了至今行走过的所有道路，也终将斩断命运的因果。
