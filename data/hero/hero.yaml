      skillDescribe: 【普攻】进行至多三段的普通攻击，分别射出1/2/3枚箭矢，造成至多{0}攻击力的<color=#dc8d48>风属性物理伤害</color>。每枚箭矢命中敌方时为自己叠加1层「风语」状态。\n普攻期间，同时按攻击和移动操作则可额外多射出1枚箭矢，造成{1}攻击力的<color=#dc8d48>风属性物理伤害</color>。\n当「风语」叠满10层时召唤「露米」（在场12秒），露米将持续自动攻击，每次总共造成{2}攻击力的<color=#dc8d48>风属性物理伤害</color>，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。\n露米存在期间西芙莉雅暴击伤害提升10%，且不会继续叠加「风语」状态。\n\n【重击】射出2枚强力箭矢，造成至多{3}攻击力的<color=#dc8d48>风属性物理伤害</color>，每次命中同时为自己叠加1层「风语」状态。\n「露米」在场时将响应重击进行特殊攻击，总共造成{4}攻击力的<color=#dc8d48>风属性物理伤害</color>，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。\n\n【闪击】直线射出3枚箭矢，造成至多{5}攻击力的<color=#dc8d48>风属性物理伤害</color>。每枚箭矢命中同时为自己叠加1层「风语」状态。\n\n【跃击】造成{6}攻击力的<color=#dc8d48>风属性物理伤害</color>。
