  unitId: 102001
  voice:
    - id: 10700301
      title: 自我介绍
      text: 我是阿比。全名…是那个很长的名字吗？说不出来…龙的时候，可以。但是，大家会听不懂。
      audioEvent: Play_VO_System_107003_Introduce
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700301_8_0
    - id: 10700302
      title: 详情·1
      text: 吃不饱的话，就飞不动了。
      audioEvent: Play_VO_System_107003_EnterInterface_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700302_8_0
    - id: 10700303
      title: 详情·2
      text: 你也想一起玩吗？
      audioEvent: Play_VO_System_107003_EnterInterface_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700303_8_0
    - id: 10700304
      title: 详情·3
      text: 好像，做了个梦…是什么呢？
      audioEvent: Play_VO_System_107003_EnterInterface_03
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700304_8_0
    - id: 10700305
      title: 关于自己·1
      text: 之前住的地方，有好多树。我喜欢在树上睡觉，很安静，很舒服。后来，树枝断掉了…是我做错事了吗？
      audioEvent: Play_VO_System_107003_AboutSelf_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700305_8_0
    - id: 10700306
      title: 关于自己·2
      text: 我是龙，我的爸爸妈妈也是龙。他们总说，阿比和大家不一样…是因为，我的爪子会变成手吗？饭煮现香…？不明白。
      audioEvent: Play_VO_System_107003_AboutSelf_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700306_8_0
    - id: 10700307
      title: 关于星临者
      text: 那个人明明说过要陪我玩，但最近总在忙别的事情…算了，我是乖孩子，我也去帮忙！这样就能继续待在一起了，然后…星临者就不会受伤了。
      audioEvent: Play_VO_System_107003_AboutPlayer_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700307_8_0
    - id: 10700308
      title: 世界见闻·1
      text: 肉很好吃，但是故乡的姐姐们都更喜欢吃果子…嗯？我没关系的。那里有一棵很大、很大…大到可以住在上面的树，那个树长出来的「食物」，能让我吃饱。
      audioEvent: Play_VO_System_107003_AboutWorld_01
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700308_8_0
    - id: 10700309
      title: 世界见闻·2
      text: 米砂姐姐的花园里有很多我没见过的花。她说过，是从来到这里之后就开始收集的，用了很长很长的时间…然后，有些种子已经「再也找不到」了，变成只有她的花园里才有的，最后一朵花。
      audioEvent: Play_VO_System_107003_AboutWorld_02
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700309_8_0
    - id: 10700310
      title: 趣闻
      text: 我知道，要做个乖孩子才行。
      audioEvent: Play_VO_System_107003_Information
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700310_8_0
    - id: 10700311
      title: 必杀技
      text: 哼！哈——马上消失掉！
      audioEvent: Play_VO_Battle_107003_UltimateSkill
      action: ""
      unlockCondition: ""
      unlockConditionText: 10700311_8_0
