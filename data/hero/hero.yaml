      skillDescribe: 【普攻】进行至多四段的普通攻击，对敌方目标造成最多{0}攻击力的<color=#1696b1>水属性魔法伤害</color>。\n普攻第二段可派生重击2，普攻第三/四段可派生重击3。\n\n【重击】以尾巴攻击敌方，造成{1}攻击力的<color=#1696b1>水属性魔法伤害</color>。\n若在普攻第二/三/四段发起重击，则会变为重击派生攻击。\n重击2：普攻第二段时重击产生。以双爪将周围敌方聚向中间并造成{2}攻击力的<color=#1696b1>水属性魔法伤害</color>，派生攻击将额外增加3点星决蓄能。\n重击3：普攻第三/四段时重击产生。蓄力吐出龙息，提升韧性效果，对敌方目标造成三段伤害（分别为10/6/4击），每段最多造成{3}/{4}/{5}攻击力的<color=#1696b1>水属性魔法伤害</color>，最后一段会消耗至多3枚水/冰/暗属性失序印记，使伤害增加{6}，并使破坏架势效率提高。\n\n【闪击】造成{7}攻击力的<color=#1696b1>水属性魔法伤害</color>。\n\n【跃击】造成{8}攻击力的<color=#1696b1>水属性魔法伤害</color>。
      skillSpecialDesc: 快点，再快点。不然阿比就要饿了。
