      skillDescribe: 【普攻】进行至多五段的普通攻击，造成{0}攻击力的多段<color=#6b4373>暗属性物理伤害</color>。\n第四段普攻命中时，为目标附加1层「鬼火」，最多叠加3层，「鬼火」将一直持续至被消耗掉为止；\n第五段普攻施放后，下一次重击蓄力所需时间缩短。\n\n【重击】原地蓄力攻击，蓄力时间越长造成的伤害越高。\n若蓄力提前施放，则打出3次攻击，造成{1}攻击力的<color=#6b4373>暗属性物理伤害</color>；\n若蓄力满后施放，则打出9次攻击，造成{2}攻击力的<color=#6b4373>暗属性物理伤害</color>。命中目标后为其附加1层「鬼火」，最多叠加3层，「鬼火」将一直持续至被消耗掉为止；\n\n【闪击】造成{3}攻击力的<color=#6b4373>暗属性物理伤害</color>。\n\n【跃击】造成{4}攻击力的<color=#6b4373>暗属性物理伤害</color>。\n在极限反击派生的跃击进行过程中，将进入无敌状态。
