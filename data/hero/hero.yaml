  introduction: 总是带着温暖的笑容，待人处事如春风拂面的木精灵少女。\n在故乡洛斯兰瑟，西芙莉雅不仅是大家眼中最优秀的新一代弓箭手，更是能托付保卫聚落之责的可靠对象。\n当她怀揣使命，踏上全新的旅途，故乡和族人的祝福亦和无处不在的清风一样，时刻长伴她的身旁。
