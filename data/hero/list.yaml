"101006":
  id: "101006"
  名称: 洛卿
  种族: 龙人族
  势力: 辰王朝
  英文名: LUO QING
  稀有度: SSR
  元素: 水
  武器类型: 鞭子
  技能:
    普攻: |-
      潜龙跃
      【普攻】进行至多四段的多段攻击，对敌方造成至多865%攻击力的水属性魔法伤害。释放星鸣技获得「溯洄」状态后，普攻总共会给敌方附加至多3枚水属性失序印记。
    重击: |-
      对敌方造成361%攻击力的水属性魔法伤害，
      命中敌方将额外增加8点星决蓄能。
    闪击: 造成101%攻击力的水属性魔法伤害。
    跃击: 造成189%攻击力的水属性魔法伤害。
    星携技: |-
      腾龙舞
      【星携技】离场时触发
      唤出雷雨覆盖一片区域（持续5.6秒），每一秒对敌方造成一次38%攻击力的水属性魔法伤害，总共会给敌方额外附加至多3枚水属性失序印记。
    极限反击: 造成267%攻击力的水属性魔法伤害。
    完美招架: |-
      打断敌方本次攻击，
      并且对敌方造成397%攻击力的水属性魔法伤害。
      命中敌方将额外增加8点星决蓄能。
    星鸣技: |-
      沧龙洄
      【星鸣技】抛出玉环攻击敌方，至多可进行两段攻击。
      第一段攻击，对敌方造成680%攻击力的水属性魔法伤害，同时自身获得「溯洄」状态，普攻总共会给敌方附加至多3枚水属性失序印记，持续12秒。
      施放第一段攻击后，再次施放星鸣技可进行第二段攻击，造成420%攻击力的水属性魔法伤害。
      施放第二段攻击后，将召唤玉环自动攻击敌方，持续5秒，造成至多231%攻击力的水属性魔法伤害。
    星结合击: |-
      造成78%攻击力的
      水属性魔法伤害。
    必杀技: ？
  台词:
    台词: 看你那副表情，似乎有些许啊…所谓云从龙，当我现身的时候，有些天气变化是很正常的现象，不要大惊小怪。
    自我介绍: |-
      我乃龙族，
      身居云海遥，善布云施雨之术，此番出行的目的…往后你会知晓的。
    详情1: 暮则为霞，晨则为露。
    详情2: 晴时唤风，阴时驱雾。
    详情3: 春而登天，秋而潜渊。
    关于自己1: |-
      唔…什么？若是无事，
      不必勉强来搭话。很在意这个铃铛？好奇心是尔辈的通病吗。与其探求龙的秘密，不如去睡一觉，做个美梦。
    关于自己2: |-
      我也曾被一些人敬若神明。
      在他们眼中，似乎只要向我献上贡品，一股脑地说出心愿，自然就能风调雨顺，万事胜意…这样的人现在少多了，实乃幸事。
    关于星临者: |-
      我本以为尔辈的精力和能力都很有限，
      可是，却有一个即便麻烦缠身，也总能打起精神的例外存在…是因为失去了往昔记忆的缘故么？可惜了。
    世界见闻1: |-
      我并非真能操纵天气，顶多只是通过云雾，
      在一城一地之间降雨而已，若是要覆盖更大的范围，就有些耗神了。你说这已经很厉害了？对于尔辈来说，或许是吧。
    世界见闻2: |-
      云海遥是那片高峰连绵的群山的统称，
      祭祀典仪的场所也在其中。我在那里度过了漫长的时间，漫长到尔辈终其一生也难以记述。那些经历，我确实不知如何分享…
    趣闻: 我不擅长讲故事。
    必杀技: |-
      雷霆雨露，皆有天数…
      邪佞尽散！似尔之辈，焉能遮天？
  牵绊:
    - 剧情名称: 脸盲
      好感等级: "2"
      台词内容: 事实上，洛卿不太能分辨其他智慧种族的相貌差异。「只是睡个觉的功夫而已，结果，好不容易记下来的人就再也遇不上了…索性还是不记省事。」
    - 剧情名称: 旧账
      好感等级: "4"
      台词内容: 镜花洲的居民偶尔会收获一些来历不明的馈赠，从山中罕见的灵药，到早已不流通的古老钱币。对于洛卿来说，即便故人不在，旧账也应偿还
    - 剧情名称: 洁净
      好感等级: "6"
      台词内容: 洛卿对于洁净有着近乎严苛的追求。平时对万事都兴味索然的她，唯独在唤雨涤尘一事上保持着极高的热情。正因如此，与凋零枯朽相伴的凶兽，是她绝对无法接受的污秽存在
    - 剧情名称: 天数
      好感等级: "8"
      台词内容: 在漫长的岁月里，洛卿坚信着万事万物均有天数。雨水从天而降，滋润大地，又会随着蒸腾的雾气重回云端…但属于她自己的「天数」究竟为何，洛卿仍未知晓
    - 剧情名称: 铃铛
      好感等级: "10"
      台词内容: 洛卿尾巴上的铃铛并不是什么玄妙法器，甚至也不是什么有价值的古物。这只是她漫步于尘世之中，与众人保持适当距离的小小「提醒」而已
"101007":
  id: "101007"
  名称: 芃芃
  种族: 帕米族
  势力: 辰王朝
  英文名: PENG PENG
  稀有度: SR
  元素: 火
  武器类型: 弓
  技能:
    普攻: |-
      芃式截拳
      【普攻】进行至多四段的普通攻击，对敌方目标造成最多1105%攻击力的火属性物理伤害。
      普攻第一段命中目标后会自动追击，触发普攻第二段。
      普攻第四段时，可多次连续施放，使之成为持续的多段伤害，随着普攻次数增加，普攻伤害逐渐提升。在普攻第四段过程中施放重击，将派生为额外重击。
    重击: |-
      蓄力重击，造成189%攻击力的火属性物理伤害。
      在普攻第四段的持续攻击过程中蓄力重击，将派生为额外重击，同时提升韧性效果，造成420%攻击力的火属性物理伤害，且会使下一次施放的星鸣技得到强化。
    闪击: 造成126%攻击力的火属性物理伤害。
    跃击: 造成210%攻击力的火属性物理伤害。
    星携技: |-
      猛虎扑食
      【星携技】入场时触发
      对敌方造成547%攻击力的火属性物理伤害，且会使下一次施放的星鸣技得到强化。
    极限反击: 造成376%攻击力的火属性物理伤害。
    精准防御: |-
      格挡敌方本次伤害，并且可以进行反击，
      造成367%攻击力的火属性物理伤害。
      此时施放普通攻击，则直接进入普攻第三段。
    星鸣技: |-
      蛟龙戏珠
      【星鸣技】对敌方目标造成672%攻击力的火属性物理伤害。
      施放额外重击/星携技后，星鸣技得到强化，至多消耗2枚火/雷/光属性失序印记，使伤害提升693%。
    星结合击: |-
      造成78%攻击力的
      火属性物理伤害。
    必杀技: ？
  台词:
    台词: 哟，你是功夫初学者吗？唔…瞧你根骨还不错，多跟我学着点吧！
    自我介绍: |-
      自我介绍？嗯，你不认识我吗？
      你竟然不认识武林新贵、未来的天下第一、本功夫大师——芃芃？看来你还需要多多历练啊！以后经常在江湖上行走，就会听到本大师的名号了！
    详情1: |-
      哼哼，你来了！
      今天有好好练武吗？
    详情2: 看看我的功夫练得怎么样！
    详情3: 嘿嘿，我厉害吧？
    关于自己1: |-
      我在吃东西上可是很讲究的！
      像这道金银满，要炸到带一点点焦的火候才最佳。而鲜菱汤呢，就得用刚刚采摘的新鲜菱角，才能炖出那种清甜的味道。不说了，你把那盘芙蓉豆腐往我这边推推，我够不到…
    关于自己2: |-
      为了挑战天下的功夫好手，
      我可是走遍了整个辰王朝！不过去了这么多地方，我还是最喜欢镜花洲！这里有东西吃，有地方睡…你说这两样在哪里都可以满足吗？那也不一定吧！至少我没有遇到过比吉逸楼更好的地方！
    关于星临者: |-
      虽然那家伙的功夫水平比起我是差远了，
      但也还是有点儿天赋的。只要每天好好练习内功，再跟本大师学上一两招，以后应该也是可以在江湖上打出一点名声的！
    世界见闻1: |-
      雾花谷？我去过的！
      那里有很漂亮的花和蝴蝶，但都是有毒的，很可怕吧！而且那边的人神神秘秘的，我不建议你这样的功夫初学者自己去，万一惹出什么麻烦…我可救不了你哦！
    世界见闻2: |-
      虽然还没有去过太远的地方…
      但我在巅峰对决打响名号之后，肯定会有很多外国的习武者慕名来向我挑战！到时候，我就可以趁机去别的地方看看了！
    趣闻: |-
      江湖上也是流传着
      不少关于本大师的传说的！
    必杀技: |-
      所谓功夫…就是——
      稳！准！狠！看我的厉害！
  牵绊:
    - 剧情名称: 恶作剧
      好感等级: "2"
      台词内容: 「想要让对手畏惧你，就要展示出自身的强大！像这样举起双手然后一下子跳到对方面前，是不是很有威慑力？」因为形象过于可爱，从未有顾客投诉过这样的恶作剧
    - 剧情名称: 能吃是福
      好感等级: "4"
      台词内容: 脆生生的红果是芃芃的最爱，但其他美食芃芃也不会轻易放过。一旦面前有充足的食物，芃芃便会吃到嘴里塞得满满当当，至于吃不下的…「帮我…打包！嗝~」
    - 剧情名称: 「蛟龙戏珠」
      好感等级: "6"
      台词内容: 芃芃的招式名起得都是大气磅礴，乍一听非常唬人的样子。但任谁也想不到，在一个名为「蛟龙戏珠」的招式里，芃芃扮演的竟然是那个「珠」！
    - 剧情名称: 功夫小熊猫
      好感等级: "8"
      台词内容: 其实，芃芃从未正统地学习过功夫，水平也飘忽不定。但凭借着好运气、帕米招人喜爱的外表和极少数的急中生智，总能在遇事时逢凶化吉。对此芃芃表示，「这就是实力！」
    - 剧情名称: 大师的修行
      好感等级: "10"
      台词内容: 「虽说练功不倦、勤能补拙……但本大师又不拙！还是去看看我的对手们都在干什么吧！」说罢，芃芃停下了打木桩的动作，又开始了到处凑热闹的一天
"101010":
  id: "101010"
  名称: 涂山小玉
  牵绊: []
"102001":
  id: "102001"
  名称: 莉莉
  英文名: LILY
  稀有度: SR
  元素: 风
  武器类型: 长柄武器
  技能:
    普攻: |-
      风翼枪术
      【普攻】进行至多五段的普通攻击，对敌方造成至多827%攻击力的风属性物理伤害。若处于精准防御后的霸体状态下，普攻最后一段将给敌方目标附加1枚风属性失序印记，且增加自身6点星决蓄能。
    重击: 造成273%攻击力的风属性物理伤害。
    闪击: 造成80%攻击力的风属性物理伤害。
    跃击: 造成189%攻击力的风属性物理伤害。
    星携技: |-
      绝境高墙
      离场时触发
      给上场的队友附加「守护」状态（持续6秒），在该状态下，接下来受到的一次伤害将被削减99%。
    极限反击: 造成263%攻击力的风属性物理伤害。
    精准防御: |-
      格挡敌方目标本次伤害，并且可以进行反击。
      命中后造成420%攻击力的风属性物理伤害，增加自身4%攻击力（持续6秒），同时自身获得霸体效果7秒。
    星鸣技: |-
      不屈之心
      【星鸣技】向敌方目标突进并造成630%攻击力的风属性物理伤害，命中后增加自身4%攻击力（持续6秒）。
      星鸣技施放结束后，自身将附加「意志」状态（持续7秒），在此状态下即使被击中也会触发精准防御。
    星结合击: |-
      造成78%攻击力的
      风属性物理伤害。
    必杀技: ？
  台词:
    台词: 我是莉莉，目前还只是一名见习骑士。不介意的话，请允许我与你同行一阵子吧？
    自我介绍: |-
      咳咳…我叫莉莉，是一名见习骑士，
      目前正在游历修行中。虽然资历尚浅，但我会将骑士守则里的内容贯彻到底！所有，如果有需要帮忙的地方，就请告诉我吧，很乐意为你效劳！
    详情1: |-
      嗨嗨，来找我了吗~
      好开心~
    详情2: |-
      接下来的安排？
      等我看看日程表！
    详情3: 见习骑士莉莉，为您效劳！
    关于自己1: |-
      我的枪术成长略显缓慢，
      在疗愈方面倒是有一些心得…这就说明，我要在珍惜天赋的同时，更加努力地锻炼枪术！成为一名既能站在同伴身前帅气地打倒怪物、又能保护大家不受伤痛侵扰的优秀骑士！
    关于自己2: |-
      战斗的理由？嘿嘿，因为骑士的长枪看起来真的很帅气！
      欸？这个理由已经说服不了你了吗？嗯…我希望修行的旅途能一直一直延伸下去，最终我们都会抵达彼此想去的地方。在此期间，战斗是避免不了的，对吧？
    关于星临者: |-
      那个人的过去确实很神秘呢，
      不过，我是不会去刨根问底的啦，毕竟，谁都会有一些小秘密的嘛。
    世界见闻1: |-
      弗利斯的「古战场」啊，虽然现在只剩下残留的痕迹，
      但也能想象当年的大战有多么惊天动地…我的心也跟着一起扑通扑通直跳呢！
    世界见闻2: |-
      如果有机会，我还想去北边的艾登兰游历一番。
      那可是骑士的起源之地啊！比起在历史书上学到的东西，果然还是亲眼见证更能带来收获，对吧？
    趣闻: |-
      你也喜欢听故事吗？
      好，这次就由我来说几个吧。
    必杀技: |2-
       该直面一切了…风暴啊，
      向我屈膝！呼…我做到了。
  牵绊:
    - 剧情名称: 少女修行中
      好感等级: "2"
      台词内容: 为了成为一名真正的骑士，莉莉离开了自己的家乡，踏上了历练之旅。她所经历的磨练数不胜数，但她的笑容永远温暖而开朗，只有她手中的盾牌记录了背后的艰辛
    - 剧情名称: 骑士准则
      好感等级: "4"
      台词内容: 「强身健体、言出必行、保护弱小、谦虚谨慎…还有…公正、英勇、荣誉…还有…」虽然骑士守则的背诵还是有些不熟练，但莉莉早已在日常生活中将其不断践行
    - 剧情名称: 途中的奇遇
      好感等级: "6"
      台词内容: 骑士修行的过程中，常有风餐露宿的时候。然而，每当接近身无分文之时，总有人以「任务委托」、「想买你的花」、「回馈社会」等理由塞给她一些财物或者吃食
    - 剧情名称: 装满口袋的是
      好感等级: "8"
      台词内容: 儿时，母亲总爱和哭泣的她玩「猜猜派派糖藏在哪个手里」的游戏。如今，她早已明白自己每次都能赢的原理，口袋里的派派糖也成为了她安慰孩子们的魔法道具
    - 剧情名称: 缓慢成长中
      好感等级: "10"
      台词内容: 莉莉的鹰嘴兽小羽迟迟没有进化为小狮鹫，仍处于风翼狮鹫的幼年阶段。不过，莉莉并不着急。据她所言，正像周围人包容了她的成长一样，她也会包容小羽的成长
"103002":
  id: "103002"
  名称: 红宝石
  牵绊: []
"104001":
  id: "104001"
  名称: 源千代
  稀有度: SSR
  元素: 暗
  职业: 爆发
  武器类型: 单手武器
  技能:
    普攻: |-
      鬼乱刀·断界
      【普攻】进行至多五段的普通攻击，造成3252%攻击力的多段暗属性物理伤害。
      第四段普攻命中时，为目标附加1层「鬼火」，最多叠加3层，「鬼火」将一直持续至被消耗掉为止；
      第五段普攻施放后，下一次重击蓄力所需时间缩短。
    重击: |-
      原地蓄力攻击，蓄力时间越长造成的伤害越高。
      若蓄力提前施放，则打出3次攻击，造成284%攻击力的暗属性物理伤害；
      若蓄力满后施放，则打出9次攻击，造成966%攻击力的暗属性物理伤害。命中目标后为其附加1层「鬼火」，最多叠加3层，「鬼火」将一直持续至被消耗掉为止；
    闪击: 造成107%攻击力的暗属性物理伤害。
    跃击: |-
      造成252%攻击力的暗属性物理伤害。
      在极限反击派生的跃击进行过程中，将进入无敌状态。
    星携技: |-
      奥传·月轮
      【星携技】入场时触发
      对敌方目标造成420%攻击力的暗属性物理伤害，并获得一层「鬼火」。攻击将直接从普攻第三段的最后一段循环开始。
    极限反击: |-
      造成256%攻击力的暗属性物理伤害。
      若在此时进行普通攻击，会触发派生跃击。
    完美招架: |-
      打断敌方本次攻击，并且可以进行反击，对敌方目标造成252%攻击力的暗属性物理伤害。
      反击攻击将直接从普攻第三段的最后一段循环开始。
    星鸣技: |-
      势中刀·百斩一瞬
      【星鸣技】拔刀斩出裂痕，对敌方目标造成420%攻击力的暗属性物理伤害。
      若目标被附加了「鬼火」，则消耗「鬼火」造成额外伤害，每消耗1层「鬼火」可进行2次攻击，每次攻击命中目标时造成42%攻击力的暗属性物理伤害；同时消耗1枚水/冰/暗属性失序印记，可使伤害提升485%。
      星鸣技命中目标后，下一次重击蓄力所需时间缩短。
    星结合击: |-
      造成78%攻击力的
      暗属性物理伤害。
  台词:
    台词: 这场相遇虽不在计划之中，但也是必然的…你我目标一致的前提下，此身此刃，会与你相伴同行。
    自我介绍: |-
      源氏一族的临时代理，源千代——
      现在，不过是一介浪人而已。为了家族交托的使命，和这把刀一起踏上了旅程。嗯？兴趣爱好？自我介绍也包括这一项吗…那样的话，泡茶或者插花吧，会让人感觉心情很放松呢。
    详情1: |-
      冷静的思考，
      便是我的制胜王道。
    详情2: |-
      刀皆有其锋芒，
      人亦如此。
    详情3: 必不辱没源氏一族的名誉。
    关于自己1: |-
      我喜欢井井有条的生活，并非「每一天都很忙碌」，而是一切都可以有序地推进下去。
      当计划被意外打乱时，也能通过冷静地思考，将事态发展引导回预期的方向——当然，如果之后遭遇了失败，我会认真检讨的。
    关于自己2: |-
      身为源氏之女，除了战斗的技巧外，还要从小接受关于礼仪和数字计算的教育。
      前者有助于塑造自己的内心，后者则能让我更加理性地认知这个世界。小时候沉浸于学习之中的状态，至今依然让我感到无比怀念。
    关于星临者: |-
      在制定下一步的计划时，脑海中会不由自主地浮现出那个人的模样。
      看来，作为伙伴，我们确实一同经历了许多。拜星临者所赐，经历了这趟旅途之后，我想要尝试的东西又多了不少。呼呼，真是不可思议的人呢，哪怕是身为鬼人的我都有些羡慕。
    世界见闻1: |-
      离开故乡之后，我选择了经由联邦的领土向南部前行。
      路过木精灵们的居所时，那棵在漫长时光中一直佑护着洛斯兰瑟的巨树给我留下了深刻的印象，精灵的故乡永远守望着它的孩子…但可惜，并不是所有飞离的鸟儿都能回到曾经栖息的枝头。
    世界见闻2: |-
      我曾在阿瓦利安生活过一段时间，和高等精灵们交流的过程中也发生了许多有意思的事情。
      比如，对方认为我所穿的服饰设计很独特，代表了一种全新的时尚风格…这就是所谓的「视角不同，感受也不同」吧？
    趣闻: |-
      身为合作伙伴，
      理应互相了解。
    必杀技: |-
      不净之物…
      当消逝于此！散！
  牵绊: []
"107001":
  id: "107001"
  名称: 西芙莉雅
  种族: 木精灵族
  势力: 洛斯兰瑟
  英文名: SYMPHORIA TARANDELION
  稀有度: SR
  元素: 风
  职业: 强袭
  武器类型: 弓
  技能:
    普攻: |-
      疾风之箭
      【普攻】进行至多三段的普通攻击，分别射出1/2/3枚箭矢，造成至多386%攻击力的风属性物理伤害。每枚箭矢命中敌方时为自己叠加1层「风语」状态。
      普攻期间，同时按攻击和移动操作则可额外多射出1枚箭矢，造成126%攻击力的风属性物理伤害。
      当「风语」叠满10层时召唤「露米」（在场12秒），露米将持续自动攻击，每次总共造成31.5%攻击力的风属性物理伤害，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。
      露米存在期间西芙莉雅暴击伤害提升10%，且不会继续叠加「风语」状态。
    重击: |-
      射出2枚强力箭矢，造成至多101%攻击力的风属性物理伤害，每次命中同时为自己叠加1层「风语」状态。
      「露米」在场时将响应重击进行特殊攻击，总共造成63%攻击力的风属性物理伤害，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。
    闪击: |-
      直线射出3枚箭矢，
      造成至多139%攻击力的风属性物理伤害。每枚箭矢命中同时为自己叠加1层「风语」状态。
    跃击: 造成189%攻击力的风属性物理伤害。
    星携技: |-
      烈风回旋曲
      【星携技】入场时触发
      直线射出5枚箭矢，若命中敌方，则每枚箭矢造成42%攻击力的风属性物理伤害并穿过敌方。箭矢命中地面产生范围伤害，造成63%攻击力的风属性物理伤害。
    极限反击: |-
      近距离踢击并造成84%攻击力的木属性物理伤害，
      之后射出5枚箭矢，至多造成158%攻击力的风属性物理伤害。每枚箭矢命中同时为自己叠加1层「风语」状态。
    集中闪避: |-
      成功后可使攻击发起方时缓，
      并且可以进行反击，造成210%攻击力的风属性物理伤害。
    星鸣技: |-
      穿流之舞
      【星鸣技】对敌方至多造成546%攻击力的木属性物理伤害，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。第一击命中时，为敌方附加1枚风属性失序印记。
      露米在场时将直线冲出，造成168%攻击力的风属性物理伤害，且当敌方有2枚及以上风属性失序印记时，伤害提升20%。
      该技能结束后，露米将暂时离场，西芙莉雅可以重新开始叠加「风语」状态。
    星结合击: |-
      造成78%攻击力的
      风属性物理伤害。
  台词:
    台词: 我的名字是西芙莉雅。啊，这位是我的同伴…其他的事情，路上慢慢说吧。
    自我介绍: |-
      我是来自永恒之泉的西芙莉雅，目前正在执行重要的长期任务…
      呃，没错，和你同行也是任务的一部分。所以…麻烦不要离开我太远！
    详情1: 又要出发了吗？
    详情2: 我准备好了。
    详情3: 旅程，还在延续。
    关于自己1: |-
      我的过去吗？应该和其他木精灵一样，没什么特别的吧…
      欸，露米有和你说过什么吗？那个…从她嘴里说出来的话，多半都很夸张，请不要全相信！
    关于自己2: |-
      我曾在女王意志的指引下参与过许多任务。
      但离开洛斯兰瑟如此之久，还是第一次…抱歉，如果连我都不安起来的话，多少会让你有些忧虑吧。嗯？没关系吗？那就好。
    关于星临者: |-
      星临者…当然是可以依赖的同伴。
      嗯，和预言、使命一类的事都无关，是我自己做出的判断。
    世界见闻1: |-
      虽然我经常在外行动，但直接住进兽人聚落里面还是头一回。
      夏露露村的风土人情和我家乡之间的差异，就像两棵完全不同的树木…不过村民们在生活中显露出的真诚和热情，足以令我动容。
    世界见闻2: |-
      弗利斯的集市上总能发现不少新奇的东西，不愧是以文化多元而闻名的城邦。
      出身各异的大家能如此友好地相处，离不开管理者的努力，希望这份和谐能在未来传播到更远的地方。
    趣闻: |-
      想听听我的经历？
      那可能要花点时间喔。
    必杀技: |-
      森林的——最后通牒！
      随风消散吧！
  牵绊:
    - 剧情名称: 长期素食主义者
      好感等级: "2"
      台词内容: 由于之前的生活习惯，西芙莉雅对肉食的接受程度并不高。「什么？要用它自己的油煎肉，还得配上没出壳的孩子一起吃?」第一次见识兽人烹饪方式的西芙莉雅震惊了
    - 剧情名称: 只是玩笑而已
      好感等级: "4"
      台词内容: 西芙莉雅生性认真，因此对于玩笑话往往不能立刻明白其中的含义，甚至会发自内心的为「当事人」担忧。唯有意识到自己被捉弄了的时候，她才会露出平常难得一见的羞恼神情
    - 剧情名称: 风语花
      好感等级: "6"
      台词内容: 对故乡的各种植物如数家珍，尤其是「风语树」。它的叶片因远程传讯的独特作用而广为人知，花朵则不见经传。西芙莉雅却对这种花情有独钟，总是会携带在身边
    - 剧情名称: 奇妙的同伴
      好感等级: "8"
      台词内容: 时常陪伴在西芙莉雅身边，是一只名为「露米」的妖精。虽然露米时常以西芙莉雅的监护人自居，但她每每闯祸时，站出来帮忙收拾残局的还是西芙莉雅
    - 剧情名称: 已遥远的故乡
      好感等级: "10"
      台词内容: 西芙莉雅此前从未如此远离过自己生长的故乡。夜深人静之时，偶尔也会有感到寂寞和怀念。或许寿命悠长的精灵，正是在一次次离别中才能真正明白旅途的意义吧
"107002":
  id: "107002"
  名称: 米砂
  种族: 木精灵族
  势力: 洛斯兰瑟
  英文名: METSA
  稀有度: SSR
  元素: 木
  武器类型: 镰刀
  技能:
    普攻: 造成攻击力155%的魔法伤害。
    星携技: |-
      绽放
      造成攻击力155%的魔法伤害。
    星鸣技: 花之刺
  台词:
    台词: 叶片上的脉络预示了你我的相逢。我是米砂，一隅之地的守护者，旅途漫长，愿我能陪你行至繁花盛开的尽头。
    自我介绍: |-
      我叫米砂，是常青之庭的守护者。
      嗯？「林英之冕」啊…这是我在离开洛斯兰瑟时才被赋予的称号，很少有人会这么称呼我，总感觉有些陌生。还是叫我的名字吧，这样…能让我回忆起过去的时光。
    详情1: 呀，你来了。
    详情2: |-
      叶隙间的日光…
      让人想起遥远的过去…
    详情3: 来我的花园里歇歇脚吧。
    关于自己1: |-
      世界树的分枝散落在世界各地，我不过是「守护者」中的一员。
      精灵族的繁荣得益于世界树的恩赐，便是倾其所有也无法回报。能像这样守护着它的一枝，是我的使命，也是我的荣幸。
    关于自己2: |-
      在此度过的漫长时光里，我所做的并非只有空等，如你所见，这座花园便是我梦想实现的证明。
      嗯，没错，我希望能有一座足够热闹的花园——草木只是缄默，却也有许多心事呢。
    关于星临者: |-
      和那孩子接触越多，就越发觉得，所谓「预言」并不能囊括其所有…
      每一条生长纹都是树木独一无二的证明，星临者的旅途也是如此。只不过这一路注定曲折，愿其抵达终点之时，仍能记得出发的理由。
    世界见闻1: |-
      迁徙的鸟儿在飞向辰的时候，会避开弗利斯郊外的一片区域。
      据我所知曾有两位大英雄在彼处争斗不休，或许是往日的阴影太过沉重，才让那里变成一片生命不敢涉足的恐怖之地。
    世界见闻2: |-
      很久很久以前，在森林和群山之外的地方，有一座将天空与大地相连的高塔…
      这是我小时候从长辈那里听来的故事，不过，它究竟是传说还是历史，或许已经无从考证了…嗯？我并非对真相感到好奇，只是觉得有些遗憾。  
    趣闻: |-
      你能听到
      林中的絮语吗？
    必杀技: |-
      穿行林野的风…
      终将大地吹拂成绿茵。让生命蔓延——
  牵绊:
    - 剧情名称: 林中的故事
      好感等级: "2"
      台词内容: 米砂自幼在森林中长大，受种族观念影响，她与外界交往甚少。不过在走遍了林中的每一寸土地、谛视过每一株植物生长的脉络后，她相信，森林能容纳的远比大家想象得还要多。
    - 剧情名称: 林英之冕
      好感等级: "4"
      台词内容: 离开故乡前，米砂被授予「林英之冕」一称，这是对她实力的认可，也象征着守护圣地的职责。授衔仪式后，她启程前往陌生的山谷，于是，故乡和誉称一同在岁月中蒙尘。
    - 剧情名称: 最初的圣地
      好感等级: "6"
      台词内容: 最初的圣地不过是一片长有世界树分枝的原野，单调且空旷。她无数次在月光下枕着树梢入眠，直到一只迁徙的鸟儿从羽绒间无意抖落下一颗花的种子，让她决定在此修建一座花园。
    - 剧情名称: 种族天赋
      好感等级: "8"
      台词内容: 米砂习惯了独自一人的生活，但森林里的奇波们也会以自己的方式向她表达亲近和依赖：它们为她衔来花枝与树种、温顺地接受她的抚摸、同她一起涉过林间的溪流…
    - 剧情名称: 如今的花园
      好感等级: "10"
      台词内容: 如今，圣地已然成为了一座珍奇的花园，但米砂仍习惯以「守护者」自称。她的梦想和使命一同扎根进泥土，和那些植株一样成为了这里的一部分。从前如此，未来亦是。
"107003":
  id: "107003"
  名称: 阿比
  种族: 龙人族
  势力: 洛斯兰瑟
  英文名: ABBY
  稀有度: SSR
  元素: 水
  职业: 破坏
  武器类型: 镰刀
  技能:
    普攻: |-
      阿比快打
      【普攻】进行至多四段的普通攻击，对敌方目标造成最多512%攻击力的水属性魔法伤害。
      普攻第二段可派生重击2，普攻第三/四段可派生重击3。
    重击: |-
      以尾巴攻击敌方，造成286%攻击力的水属性魔法伤害。
      若在普攻第二/三/四段发起重击，则会变为重击派生攻击。
      重击2：普攻第二段时重击产生。以双爪将周围敌方聚向中间并造成210%攻击力的水属性魔法伤害，派生攻击将额外增加3点星决蓄能。
      重击3：普攻第三/四段时重击产生。蓄力吐出龙息，提升韧性效果，对敌方目标造成三段伤害（分别为10/6/4击），每段最多造成168%/252%/420%攻击力的水属性魔法伤害，最后一段会消耗至多3枚水/冰/暗属性失序印记，使伤害增加905%，并使破坏架势效率提高。
    闪击: 造成105%攻击力的水属性魔法伤害。
    跃击: 造成263%攻击力的水属性魔法伤害。
    星携技: |-
      饿龙吐息
      【星携技】入场时触发
      对敌方目标造成525%攻击力的水属性魔法伤害，此时施放重击，可直接转入重击3阶段。
    极限反击: 造成231%攻击力的水属性魔法伤害。
    完美招架: |-
      打断敌方目标本次攻击，
      并且可以进行反击，对敌方目标造成494%攻击力的水属性魔法伤害。此时施放重击，可直接转入重击3阶段。
    星鸣技: |-
      阿比突击
      【星鸣技】向前突进并用龙爪连续攻击，对敌方目标造成1512%攻击力的水属性魔法伤害，所有攻击全部命中时将额外增加5点星决蓄能。
      在星鸣技施放后使用重击，将直接转入重击2阶段。
    星结合击: |-
      造成78%攻击力的
      水属性魔法伤害。
  台词:
    台词: 阿比，肚子饿了。这边好像有，很好吃的味道…
    自我介绍: |-
      我是阿比。全名…是那个很长的名字吗？
      说不出来…龙的时候，可以。但是，大家会听不懂。
    详情1: |-
      吃不饱的话，
      就飞不动了。 
    详情2: 你也想一起玩吗？
    详情3: |-
      好像，做了个梦…
      是什么呢？
    关于自己1: |-
      之前住的地方，有好多树。我喜欢在树上睡觉，很安静，很舒服。
      后来，树枝断掉了…是我做错事了吗？
    关于自己2: |-
      我是龙，我的爸爸妈妈也是龙。他们总说，阿比和大家不一样…
      是因为，我的爪子会变成手吗？饭煮现香…？不明白。
    关于星临者: |-
      那个人明明说过要陪我玩，但最近总在忙别的事情…
      算了，我是乖孩子，我也去帮忙！这样就能继续待在一起了，然后…星临者就不会受伤了。
    世界见闻1: |-
      肉很好吃，但是故乡的姐姐们都更喜欢吃果子…
      嗯？我没关系的。那里有一棵很大、很大…大到可以住在上面的树，那个树长出来的「食物」，能让我吃饱。
    世界见闻2: |-
      米砂姐姐的花园里有很多我没见过的花。
      她说过，是从来到这里之后就开始收集的，用了很长很长的时间…然后，有些种子已经「再也找不到」了，变成只有她的花园里才有的，最后一朵花。
    趣闻: |-
      我知道，
      要做个乖孩子才行。
    必杀技: |-
      哼！哈——
      马上消失掉！
  牵绊:
    - 剧情名称: 好奇心
      好感等级: "2"
      台词内容: 孩童时期践行好奇心的第一步，往往是伸出手。曾在第一次见到红宝虫时，用一根手指把对方背上的红宝石戳掉了。也曾试图通过一起玩游戏的方式缓和关系，未遂。
    - 剧情名称: 营养剂
      好感等级: "4"
      台词内容: 在洛斯兰瑟的时候，阿比并不能理解木精灵邻居们的饮食习惯。在她看来，明明只需要吃肉就够了。但作为乖孩子，她也会老老实实吃下从世界树萃取的特殊「营养补充剂」。
    - 剧情名称: 独特的品味
      好感等级: "6"
      台词内容: 放飞自我之后，阿比除了最爱的肉，又养成了吃「零食」的习惯：比如，把大块的翠纤石当糖块嚼碎咽下去。或许，她的品味会和某些奇波有共同语言…
    - 剧情名称: 重点关注对象
      好感等级: "8"
      台词内容: 年幼的阿比曾凭借「乱捡贵重宝石吃」、「做梦时砸断树枝」、「恐吓奇波陪玩」等多项指控，被大家列为了长期重点关注对象。
    - 剧情名称: 返祖现象
      好感等级: "10"
      台词内容: 虽然是龙人族的亚种，但并非所有的碧羽灵龙都能在两种形态之间自由转化，人形态的出现被视为一种返祖现象。不过，阿比似乎并不纠结这些不同。
"108001":
  id: "108001"
  名称: 忒拉拉
  种族: 兽人族
  势力: 夏露露村
  英文名: TERARA
  稀有度: SR
  元素: 火
  职业: 爆发
  武器类型: 长柄武器
  技能:
    普攻: |-
      狼行焰影
      【普攻】进行至多五段的普通攻击，对敌方造成最多701%攻击力的火属性物理伤害。第五段攻击命中敌方时，将为自身附加「炽腾」状态，持续10秒。在该状态下重击可触发派生攻击，触发后清除状态。
    重击: |-
      造成294%攻击力的火属性物理伤害。
      「炽腾」状态下长按重击可触发派生攻击，触发后清除状态。
      重击派生会对敌方进行多段攻击，每击均会为自己恢复等同于自身6%攻击力的生命值，并对敌方造成最多756%攻击力的火属性物理伤害。派生攻击结束动作命中目标时，可消耗1枚风/土/木属性失序印记，并使伤害提升588%。
      重击派生过程中韧性效果提升。若过早停止长按，则无法触发重击派生，且消耗「炽腾」状态。
    闪击: 造成63%攻击力的火属性物理伤害。
    跃击: 造成168%攻击力的火属性物理伤害。
    星携技: |-
      灼焰烈舞
      【星携技】入场时触发
      对敌方造成714%攻击力的多段火属性物理伤害，第五击命中目标时，可消耗1枚风/土/木属性失序印记，并使伤害提升347%。
    极限反击: 造成256%攻击力的火属性物理伤害。
    精准防御: |-
      格挡本次敌方伤害，并且可以进行反击，
      造成330%攻击力的火属性物理伤害。并为自身附加「炽腾」状态，持续10秒。在该状态下重击可触发派生攻击，触发后清除状态。
    星鸣技: |-
      跃空行枪
      【星鸣技】对敌方造成714%攻击力的多段火属性物理伤害，第五击命中目标时，可消耗1枚风/土/木属性失序印记，并使伤害提升347%。
      同时为自身附加「炽腾」状态，持续10秒。在该状态下重击可触发派生攻击，触发后清除状态。
    星结合击: |-
      造成78%攻击力的
      火属性物理伤害。
  台词:
    台词: 呀！我叫忒拉拉！听说你遇到麻烦了？有我来了你就放一百个心吧！
    自我介绍: |-
      我叫做忒拉拉，在夏露露村长大，是村子里最厉害的猎人！
      既然成为了伙伴，那以后就让我来罩着你吧！怎么样，是不是已经开始崇拜上我了？
    详情1: 呀吼！又见面啦~
    详情2: 见到你真是太好啦！
    详情3: 有我罩着你呢！
    关于自己1: |-
      身体健康的秘诀？当然是「多吃肉、勤锻炼」啊！
      我每天都会去村子外面巡视三圈、帮驮兽搬运货物、到森林里狩猎、回来后再大吃一顿！这样吧，明天开始你就跟着我一起锻炼，把之前缺少的运动量都补回来！
    关于自己2: |-
      冲动？可是想要解决问题，总得先动起来才行吧？
      况且只要有一个人能站出来，那其他人就能从中获得一点勇气吧？欸…你那是什么眼神啊！难道你一直觉得我纯粹就是个笨蛋吗？
    关于星临者: |-
      那家伙的确很奇怪，明明还没搞清自己的处境，却愿意拼尽全力保护其他人，这份勇气就连我都忍不住有些羡慕。
      更重要的是，正因为遇到了星临者，我才下定决心要出去转转…看来变化也不一定是什么坏事嘛！
    世界见闻1: |-
      山谷里的那个大家伙，出村的时候一眼就能看到了吧！
      巨大的、清澈的、绽放着光芒的蓝色水晶。我经常带着乌尔一起去那附近打猎，水晶附近的动物都十分活跃呢！啊，对了，如果你想试着下水，也可以叫上我一起哦！
    世界见闻2: |-
      我才不会羡慕那些长着翅膀的家伙，
      只要我跳得够高，就能看到和他们眼中一样的景色。
    趣闻: |-
      咦，想要知道我的事吗？
      好啊，先从哪里开始说起呢？
    必杀技: |-
      碍事的家伙，统统打飞…
      这下知道痛了吧？
  牵绊:
    - 剧情名称: 孩子王
      好感等级: "2"
      台词内容: 村民口中那个「带小孩子玩却比小孩子玩得更投入」的忒拉拉，毫无疑问是深受欢迎的孩子王。对于这一点，她相当骄傲：「这不是说明我玩游戏很厉害嘛！」
    - 剧情名称: 腰间的号角
      好感等级: "4"
      台词内容: 忒拉拉非常珍惜腰间别着的号角，据她所说，这是她一直很佩服的猎手在离开村庄时送给她的。她将号角随身携带，期盼着有一天能像那位猎手一样独当一面。
    - 剧情名称: 乌尔的龋齿
      好感等级: "6"
      台词内容: 作为她重要的伙伴，忒拉拉从小吃什么都会给乌尔留一份，包括每个孩子都爱的糖。结果，村里负责给奇波体检的大叔始终没明白「乌尔为什么会有龋齿」。
    - 剧情名称: 笨蛋不会感冒
      好感等级: "8"
      台词内容: 忒拉拉从小奔跑在山野林间，身体素质极佳，鲜少生病。她本人很讨厌「笨蛋不会感冒」这个说法——自己绝对绝对不是笨蛋！
    - 剧情名称: 毛茸茸的大尾巴
      好感等级: "10"
      台词内容: 忒拉拉午睡时会下意识地抱住自己毛茸茸的尾巴，温暖而有安全感。当然，刚睡醒时迷迷糊糊忘记了怀中的尾巴、从而自己把自己绊倒的糗事，偶尔也会发生。
"108002":
  id: "108002"
  名称: 璐璐卡
  种族: 兽人族
  势力: 夏露露村
  英文名: LURUKA
  稀有度: SSR
  元素: 水
  职业: 增幅
  武器类型: 镰刀
  技能:
    普攻: |-
      涟漪之舞
      【普攻】进行至多三段的普通攻击，对敌方造成最多563%攻击力的水属性魔法伤害。
      施放第三段普攻后，长按攻击键，可加快重击蓄力速度。
    重击: |-
      对敌方目标造成水属性魔法伤害，蓄力时间越长造成的伤害越高，最多可三段蓄力。
      一阶蓄力进行三段攻击，对敌方造成最多84%攻击力的水属性魔法伤害。
      二阶蓄力进行四段攻击，对敌方造成最多546%攻击力的水属性魔法伤害。
      三阶蓄力进行九段攻击，对敌方造成最多882%攻击力的水属性魔法伤害，且命中敌人降低防御力15%，持续24秒并附加1枚水属性失序。
    闪击: 造成97%攻击力的水属性魔法伤害。
    跃击: 造成160%攻击力的水属性魔法伤害。
    星携技: |-
      万灵的誓约
      【星携技】离场时触发
      召唤「活力之灵」，治疗范围内的所有友方单位。每2秒为被治疗者恢复等同于其生命上限6.3%的生命值，最多治疗6次。
    极限反击: 造成237%攻击力的水属性魔法伤害。
    精准防御: |-
      格挡敌方目标本次伤害，
      并且可以进行反击，造成281%攻击力的水属性魔法伤害。
    星鸣技: |-
      洑流之源
      【星鸣技】召唤「智慧之灵」，并撞击敌方，造成最多588%攻击力的水属性魔法伤害，持续10秒。每次召唤需间隔1秒。
      施放星鸣技时，暴击率将提升6%，持续8秒。
      施放星鸣技后，长按攻击键，可加快重击蓄力速度。
      场上最多同时存在2只「智慧之灵」。
    星结合击: |-
      造成78%攻击力的
      水属性魔法伤害。
  台词:
    台词: 那个…初次见面，你好，我是夏露露村的璐璐卡。如果有我能帮得上忙的事，请尽管跟我说吧！
    自我介绍: |-
      我叫做璐璐卡，是夏露露村中狼族的一员，负责村里的祭祀之职。
      虽然资历尚浅，但我会不断努力的…那个，无论何时需要借助我的力量，我都会尽快赶来的！嗯，请多多关照了。
    详情1: |-
      烦恼的话，
      可以随时向我倾诉。
    详情2: |-
      为了守护大家，
      我会竭尽全力。
    详情3: |-
      无论何时，
      思念总将我们联系在一起…
    关于自己1: |-
      粉色的头发…是天生就这个颜色的，尽管和村里的大家都不太一样，但我不觉得是什么坏事喔？
      姐姐也说过，她很喜欢这个颜色，看起来就像晚霞一样。唔…说这话的时候她有些犹豫来着，我猜她心里想的其实是半熟烤肉之类的比喻吧？
    关于自己2: |-
      我的本职工作是萨满，同时也负责给村里人治病，要说草药的知识是哪里来的…
      一部分是村子里流传下来的，还有一部分是山谷中的动物们告诉我的，剩下的就是……一点点尝试得出来的吧。多亏了萨满的能力，草药中少量的毒性也无碍于我。
    关于星临者: |-
      那个人用不可思议的知识和能力，给我提供了扫清心中迷惘的机会。
      多亏了那个人的努力，困扰我们许久的问题才得以解决。星临者阁下，请允许我为你的前路献上祈愿，愿你的未来如星辰一样闪耀。
    世界见闻1: |-
      万物之灵一直行走在这片大地上，它们也是自然的一部分，赐予我们勇气和智慧，教导我们保持谦逊和尊重。
      声音、舞步、手势、思念，都是与其沟通的语言——没错，所谓的沟通方式并没有绝对的对错，我惯于使用祝词与手势，你要不要试试用鼓点和舞步来通灵呢？
    世界见闻2: |-
      听村长爷爷说，在遥远的北方有三座巨大的山脉，
      每座山脉的最高峰上都住着一条龙，和与我们所认知的不同，那些山脉上的龙是足以撼动世界的、龙族的支配者…虽然话是这么说，不过村长爷爷的故事大概只有一半可信吧，嗯。
    趣闻: |-
      心灵会指引你
      走向真正的自己。
    必杀技: |-
      悠久的森之灵啊…
      请借我您的力量！守护生命的延续！
  牵绊:
    - 剧情名称: 通灵的萨满
      好感等级: "2"
      台词内容: 从小便展露出极高的通灵天赋，据说同辈们还在牙牙学语的时候，她就能把萨满的祝词倒背如流了。「我也是先学会说话，之后才……」以上是本人的回应。
    - 剧情名称: 所谓副业
      好感等级: "4"
      台词内容: 为了帮助村民们解决健康问题自学了医术，却在调配汤剂的时候意外掌握了各种或美味或奇葩的饮品制作方法。好奇的村民会以身体不适为由，向璐璐卡讨要特调的药汤。
    - 剧情名称: 想要成为依靠
      好感等级: "6"
      台词内容: 「我也想成为姐姐的依靠」，被忒拉拉从村子外捡回来时，少女曾许下过这样的愿望。就是不知道为性格冒失的姐姐劳心劳力…算不算一种实现愿望的方式呢？
    - 剧情名称: 万灵的脚步声
      好感等级: "8"
      台词内容: 萨满们都相信，神鼓是宇宙的缩影，每一次鼓槌的敲击都是万灵在其中行进的脚步声。比起神鼓本身，璐璐卡更珍视历代传承的鼓槌，以及那种先祖之灵就陪在自己身边的感觉。
    - 剧情名称: 重要的家人
      好感等级: "10"
      台词内容: 和白狼们一起在林中散步的日子，似乎已经过去了很久。敏感内敛的少女也有了更多可以依靠的家人。然而那枚寄托思念的项链，始终不曾摘下。
"108003":
  id: "108003"
  名称: 米蒂
  英文名: MITTY
  稀有度: SR
  元素: 雷
  职业: 赋予
  武器类型: 弓
  技能:
    普攻: |-
      破空箭
      【普攻】进行至多三段的普通攻击，分别射出2/3/4枚箭矢，造成最多487%攻击力的雷属性物理伤害。
    重击: |-
      对敌方造成69%攻击力的雷属性物理伤害，蓄力时间越长，造成的伤害量越高。
      若蓄力提前施放，则射出1枚箭矢，造成42%攻击力的雷属性物理伤害。命中敌方后生成半径2米的弱闪电球，持续2秒。弱闪电球每次放电将对范围内敌方造成21%攻击力的雷属性物理伤害，最多放电6次。
      若蓄力满后施放，则射出1枚箭矢，造成84%攻击力的雷属性物理伤害，并附加1枚雷属性失序印记。命中敌方后生成半径2米的闪电球，持续2秒。闪电球每次放电将对范围内敌方造成21%攻击力的雷属性物理伤害，最多放电12次。
      若米蒂处于「蓄电」状态，满蓄力重击时将会分散射出三枚箭矢，命中敌方时均可形成闪电球。
    闪击: 造成100.8%攻击力的雷属性物理伤害。
    跃击: 造成168%攻击力的雷属性物理伤害。
    星携技: |-
      雷电强袭
      【星携技】离场时触发
      在地面形成半径6米的引雷场，最多造成11击伤害，每次命中敌方造成21%攻击力的雷属性物理伤害。至多为引雷场中目标添加1枚雷属性失序印记。
    极限反击: 对直线范围内的敌方造成262.5%攻击力的雷属性物理伤害。
    集中闪避: |-
      闪避本次敌方伤害，
      成功后可使攻击发起方时缓，并且可以进行反击，造成231%攻击力的雷属性物理伤害，并附加1枚雷属性失序印记。命中敌方后可生成满蓄力重击时的闪电球。
    星鸣技: |-
      迅风箭
      【星鸣技】对敌方发起连射，造成882%攻击力的雷属性物理伤害。第四击命中，为目标附加1枚雷属性失序印记。
      施放星鸣技后，自身获得最多可持续10秒的「蓄电」状态，该状态将强化重击效果，施放一次重击后状态消失。
    星结合击: |-
      造成78%攻击力的
      雷属性物理伤害。
  台词:
    台词: 哼，你就好好看着未来的翼人战士有多强吧！还有，我是因为你保护了山谷，作为回报才来帮忙的，你可别想太多了…！
    自我介绍: |-
      我叫米蒂。看到这对翅膀了吧？
      没错，我是翼人族的一员，任何猎物都逃不开我们的追捕。先说好，要我帮忙可以，但我可没打算和你搞好关系。
    详情1: |-
      翼人的战士，
      不会轻易退缩！
    详情2: 好好学着吧你！
    详情3: 我的弓箭可是百里挑一！
    关于自己1: |-
      该开始今天的狩猎了！猎物在哪里？我现在怎么知道啦，所以这才要去找嘛！
      真是的，像你这样的外行…要学习的地方还有很多，乖乖跟上就是了。
    关于自己2: |-
      翅膀上的伤？哼，只是稍微擦破了一点而已，能有什么大不了嘛，早就已经愈合了…
      不、不过，还算你有心，能注意到这一点。好了好了，总之不用担心，我没问题的！
    关于星临者: |-
      虽然没有翅膀，但脑子还是挺好使的，能想出很多解决问题的办法…
      这、这才不是夸奖！只是作为观察的对象进行分析罢了！
    世界见闻1: |-
      山谷里的风是我们获取情报的途径之一。
      在不同的高度，风所传达的信息也是不一样的。你出现在山谷里的那天，我们自然也注意到了风中不寻常的波动，怎么样，翼人的敏锐是不是远超你的想象？
    世界见闻2: |-
      那个，为了你好，我再多说两句。
      经过森林时多留意脚下，尤其是某些湿答答的地方，那里头的蘑菇还会动！恶…想到就浑身难受…
    趣闻: |-
      干、干嘛一直盯着我…
      我可没什么心虚的事情！
    必杀技: |-
      接好了…
      这可是来自天空的礼物——！雷电强袭！
  牵绊:
    - 剧情名称: 亲手所作
      好感等级: "2"
      台词内容: 米蒂的猎弓是她自己收集材料，利用尺寸不合格的次品弓胚改造的。「毕竟，像我这么厉害的战士，遇到问题就要靠自己解决才行，不能用因为区区武器就给工匠师傅添麻烦…」
    - 剧情名称: 多想无益
      好感等级: "4"
      台词内容: 米蒂的箭术其实早已将同龄人甩在身后，妨碍她射中目标的，只有她自己的紧张情绪而已。因此，她的大部分猎物都是近距离遭遇，来不及担心「这箭能中吗」时本能拉弓所获。
    - 剧情名称: 不完全直率
      好感等级: "6"
      台词内容: 米蒂虽然口头上从不肯服输，但本质上还是个乐于助人的好孩子，当受到感谢的时候会控制不住地扇起翅膀。当然，对于非翼人的种族来说，可能无法从中察觉到米蒂的真实心意。
    - 剧情名称: 飞行特训
      好感等级: "8"
      台词内容: 经历了成人礼的失败之后，米蒂为了学会飞行，暗地里努力了很久。甚至，她还从鹰神赞颂诗中「汲取灵感」，尝试在雷雨天利用狂暴的气旋起飞…然后被阻止并狠狠训斥了。
    - 剧情名称: 才不是兽人
      好感等级: "10"
      台词内容: 当米蒂得知严格来说翼人也算是兽人的分支的时候，她的表情仿佛是天都塌了。「这怎么可以接受啊？你好久不打交道的邻居，突然成了你家远房亲戚什么的…」
"109001":
  id: "109001"
  名称: 末音
  种族: 高等精灵族
  势力: 阿瓦利安
  英文名: MORWYN HALKON
  稀有度: SSR
  元素: 雷
  职业: 强袭
  武器类型: 双刀
  技能:
    普攻: |-
      哈库茵剑舞
      【普通攻击】进行至多五段的普通攻击，对敌方造成至多1319%攻击力的风/雷属性物理伤害。
      若末音处于「璀璨」状态，第四/五段攻击命中后，分别为敌方附加1枚风/雷属性失序印记。
    重击: |-
      造成399%攻击力的雷属性物理伤害。
      若敌方已被附加了雷属性失序，则每击额外增加1点星决蓄能。
    闪击: 造成84%攻击力的雷属性物理伤害。
    跃击: 造成286%攻击力的雷属性物理伤害。
    星携技: |-
      绽华章之舞
      【星携技】入场时触发
      造成420%攻击力的雷属性物理伤害。
      施放星携技后可进行一次追击，造成328%攻击力的雷属性物理伤害，并为自身附加「璀璨」状态（持续8秒）。追击可衔接普攻第四段。
    极限反击: |-
      造成328%攻击力的雷属性物理伤害，
      并为自身附加「璀璨」状态（持续8秒）。
    完美招架: |-
      打断敌方本次攻击，并且可以进行反击，
      造成368%攻击力的雷属性物理伤害。若末音处于「璀璨」状态，命中后为敌方附加1枚风属性失序印记。
    星鸣技: |-
      涌雷动之跃
      【星鸣技】借助雷电之势，对沿途敌方造成252%攻击力的雷属性物理伤害。
      当命中的敌方已被附加2枚及以上的雷属性失序印记时，额外造成40%攻击力的伤害。
      当命中的敌方已被附加2枚及以上的风属性失序印记时，自身暴击率提升3%，持续8秒。
      施放过程中，再次按下攻击操作可进行追击，造成328%攻击力的雷属性物理伤害，并为自身附加「璀璨」状态（持续8秒）。追击后，可以直接衔接普攻第四段攻击。
      星鸣技可以充能2次。
    星结合击: |-
      造成78%攻击力的
      雷属性物理伤害。
  台词:
    台词: 阿瓦利安御座，哈库茵家族继承人，「聆剑之心」末音·哈库茵代表家族向你致以问候，在终焉之日来临前，让我们携手同行吧。
    自我介绍: |-
      哈库茵剑舞继承人，聆剑之心，风雷降生，这些都是我，但我更希望你能叫我末音，因为我们是志同道合的伙伴。
      哈库茵家族的雇员遍布全世界，无论你身处何处都能得到帮助，至于价格，我还没想好，就算你先欠我三个愿望好了。
    详情1: 聆听剑风划过的声音。
    详情2: |-
      我是哈库茵家族的继承人，
      也是末音。
    详情3: |-
      既然是志同道合的伙伴，
      让你多了解一些也无妨。
    关于自己1: |-
      阿瓦利安有四位剑技巅峰，其中有两位便是我的父母，
      父亲教导的剑技刚硬且勇往直前，母亲教导的剑技轻盈中潜藏杀意。但我的双剑既无强固，亦不蛰伏，我要走我的路。
    关于自己2: |-
      有时说话太一板一眼了？真是的…
      你以为我每天要处理多少份来自普罗米利亚各地的回函，要是不聚精会神一点，肯定会有所纰漏。倒不如说，你什么时候能答应我帮忙处理一些事务呢，星临者大人。
    关于星临者: |-
      无论是能力，还是思维韬略，毫无疑问都是上上之才，
      要是我们哈库茵家族能够得到星临者的帮助，家族的实力必然会有所加强，这就是星临者的不可替代性。
    世界见闻1: |-
      洛斯兰瑟的沿海有一片巨大的黄金海岸，据说只有在那才能喝到世界上最好喝的冷饮，
      那群守旧派虽然思维落后，不过在研究这类商品上倒是颇有创意。我们虽然掌握着更多的知识，但仍需不断拓宽视野啊。
    世界见闻2: |-
      家族里的老人会传一个关于塔尔西斯的诡异故事，那片红色沙漠的真相，
      似乎是上一纪元爆发的超烈度决战，无数生灵留下的痕迹将那片沙漠染红。不过类似这样的故事哪里都有，也不能完全相信。
    趣闻: |-
      想了解我的事？…
      让你看看也无妨。
    必杀技: |-
      聆听这——
      剑雷华章，直至消散！ 
  牵绊:
    - 剧情名称: 前进之风
      好感等级: "2"
      台词内容: 「末音殿下，这份文件需要签字。」
        「放那吧。」末音的办公桌上垒了一座公文小山，她每晚都熬到深夜。「轻柔之风便可给予花朵自由，但若想前进，便要掀起飓风。」
    - 剧情名称: 买买买
      好感等级: "4"
      台词内容: 「这个和那个不要，其他的都包起来。」末音买东西会优先选择那些自己不要的东西，然后把其他的全买了。再然后就是拿出一块老板基本找不开的大额宝石。
    - 剧情名称: 吐槽役
      好感等级: "6"
      台词内容: 和第八星临者一同冒险的旅程中，由于总是受到突然袭击，末音终于忍不住开口问了所有人都想问的问题——「怎么搞的为什么和你在一起就总是被凶兽袭击啊？」
    - 剧情名称: 天然黑
      好感等级: "8"
      台词内容: 对于无故浪费一事，末音向来是零容忍的，她会随手关上她能看到的任何应该关上的东西。于是她把手伸向了家里冷库那没关上的门，只是，第八星临者似乎还在其中。
    - 剧情名称: 下午茶爱好者
      好感等级: "10"
      台词内容: 哈库茵家族嗜茶如命。「预热茶壶，每人份略少于一汤匙的茶叶，刚沸腾的开水，静候五分钟。」最后一定要先倒好牛奶再加入红茶，这便是末音的泡茶之道。
"109002":
  id: "109002"
  名称: 夏儿
  种族: 高等精灵族
  势力: 阿瓦利安
  英文名: SHALLE ENSYS
  稀有度: SSR
  元素: 水
  职业: 爆发
  武器类型: 双刀
  技能:
    普攻: |-
      流水贯石
      【普攻】进行至多六段的多段攻击，对敌方造成至多1082%攻击力的水属性物理伤害。
      施放星鸣技的8秒内，普攻第四段、第六段命中敌人，能消耗1枚火/雷/光属性失序额外造成588%攻击力的水属性物理伤害。
    重击: |-
      蓄力后全力突刺，对敌方造成光属性物理伤害。
      若冲刺后立刻停止，则造成105%攻击力的光属性物理伤害；
      若蓄满造成210%攻击力的光属性物理伤害且还会进行投枪攻击，造成1134%攻击力的光属性物理伤害。
      施放星鸣技的8秒内投枪攻击，能消耗1枚火/雷/光属性失序，额外造成588%攻击力的光属性物理伤害。
    闪击: 造成204%攻击力的水属性物理伤害。
    跃击: 造成252%攻击力的光属性物理伤害。
    星携技: |-
      恒世之枪
      【星携技】入场时触发
      蓄力后全力突刺并发动投枪，破韧效果提升，且对敌方造成554%攻击力的光属性物理伤害。
    极限反击: 造成183%攻击力的水属性物理伤害。
    精准防御: |-
      格挡本次敌方伤害，并且可以进行反击，
      造成336%攻击力的水属性物理伤害。
    星鸣技: |-
      旋光
      【星鸣技】对周围敌人造成1050%攻击力的光属性物理伤害，并产生牵引效果，将敌方拉至近身。
      施放后普攻将获得霸体效果，持续8秒，同时普攻第四段、普攻第六段、重击投枪攻击获得强化。
    星结合击: |-
      造成78%攻击力的
      光属性物理伤害。
  台词:
    台词: 赶上了…！我是夏儿。此后，请允许我与你同行，我一定…能成为你的力量。
    自我介绍: |-
      等一下，洛伊莱，不要闹，咻…好，乖，乖——
      呼…真对不起，让你看到丢人的一幕了…我叫夏儿，隶属于阿瓦利安的天马骑士团，这孩子是我的搭档洛伊莱，希望我们都能成为你可以依靠的力量，星临者。
    详情1: |-
      啊，我正想着你什么时候会来呢，
      星临者。
    详情2: |-
      需要我出马了？
      随时待命！
    详情3: "看洛伊莱的反应， 我就知道是你。 "
    关于自己1: |-
      精灵族的孩子们都对天马骑士团充满向往，
      但我们的日常工作可不像他们想的那么帅气。巡逻、检查、调停…是不是听起来都很琐碎？不过就算微不足道，也一定会有人因此得到帮助…这正是我选择加入的原因。
    关于自己2: |-
      那个，说起来有些不好意思，我常被人说饭量比较大…
      但、但是啊？！我拿的长枪其实是很重的！平常运动的消耗也很多，所以食欲旺盛些是很正常的事吧？也、也就是…五倍左右…呜。
    关于星临者: |-
      那个人就像明星一样耀眼，能够在黑暗的夜空中指引方向…
      希望有一天，能和那个人一起，向着我们所期望的未来携手前行…我相信，那一天不会太遥远。
    世界见闻1: |-
      阿瓦利安的书里记载了很多来自世界各地、被认为是真实存在过的、不可思议的故事。
      有机会的话，真想去书中所写的地方，亲眼看看漂浮在空中的水滴、无限延伸的天之塔以及永冬的花海…当然，也有些纯粹的幻想故事，比如一个没有魔法的世界——如果它真的存在于某处，我也想去感受一下——那个世界的人是如何生活的，平时又在想些什么呢？
    世界见闻2: |-
      虽然算不上有用的信息…在阿瓦利安中心区域第二条街尽头，
      有一家没有招牌的面包店，每天都用花园里摘的某种奇特浆果制作现烤的水果面包。听说除了那家店外，就只有北方的伊冬能找到那种浆果了。而且吃完后一段时间内都尝不到酸味…最重要的是，它真的很好吃！烤得松松软软，又融合了浆果清爽的味道，有机会的话，请一定要尝尝看！
    趣闻: |-
      关于我的事吗…唔，
      还挺难为情的，想了解哪些方面呢？
    必杀技: |-
      以此身，聚此世之光。
      贯穿吧！这就是，我的意志！
  牵绊:
    - 剧情名称: 身份谬误
      好感等级: "2"
      台词内容: 具有很高的自然亲和力，加之温柔清爽的性格和气质，时常会被外人误以为是木精灵。夏儿本人对此并不反感：「木精灵也很棒，那种穿行林地的敏捷度，令人向往。」
    - 剧情名称: 营养补充
      好感等级: "4"
      台词内容: 平时就有随身携带应急食物的习惯，在临战时更是会加倍储存。不仅是自己，连同洛伊莱那份也会一同考虑进去。夏儿深知，饿着肚子是无法获得胜利的。
    - 剧情名称: 一字直线
      好感等级: "6"
      台词内容: 和携枪冲锋时的气势一样，大部分时间中夏儿的思维模式也是直线型。通常她解决问题的过程就是把目标和结果笔直地相连，然后平缓而坚定地执行下去。
    - 剧情名称: 恶念感知
      好感等级: "8"
      台词内容: 夏儿从未恶意揣度过他人，但对他人的恶意倒是格外敏感，这一点和天马颇为相似。除此之外，她还可以敏锐地感知到凶兽的恶念，并在行动中屡次帮助骑士团转危为安。
    - 剧情名称: 直到天涯尽头
      好感等级: "10"
      台词内容: 闲暇时很喜欢与洛伊莱在空中漫无目的地骑行，往往等回过神来时已经离出发地十分遥远了。抵达前人未至的地方，目睹前所未见的风景，正是她一直以来的梦想。
"111001":
  id: "111001"
  名称: 珐兰塔
  种族: 兽人族
  英文名: FARIDAH
  稀有度: SSR
  元素: 风
  职业: 破坏
  武器类型: 长柄武器
  技能:
    普攻: |-
      疾风投羽
      【普攻】进行至多四段的普通攻击，对敌方造成至多777%攻击力的风属性物理伤害。
      普攻每段命中敌方后，0.4秒内继续发起攻击可触发三段追击。
      三段追击分别对敌方造成至多294%/365%/202%攻击力的风属性物理伤害，追击3命中敌人时可消耗1枚地/木/风属性失序额外造成485.1%攻击力的风属性物理伤害，同时使这击的架势破坏效率提升。
    重击: |-
      可发动追击冲向敌方，
      造成6次总计410%攻击力的风属性物理伤害。
    闪击: 造成101%攻击力的风属性物理伤害。
    跃击: 造成218%攻击力的风属性物理伤害。
    星携技: |-
      风暴再临
      【星携技】入场时触发
      对敌方发起追击，造成227%攻击力的风属性物理伤害。
      命中敌方后，0.4秒内发起攻击可触发三段追击。
    极限反击: 造成311%攻击力的风属性物理伤害。
    完美招架: |-
      完美招架反击命中敌方后，
      对其造成254%攻击力的风属性物理伤害，0.4秒内继续发起攻击可触发三段追击。
    星鸣技: |-
      斩彻裂空
      【星鸣技】对敌方造成764%攻击力的风属性物理伤害，命中后的2秒内继续发起攻击可触发普攻追击。
    星结合击: |-
      造成78%攻击力的
      风属性物理伤害。
  台词:
    台词: 无需多言，需要力量的话，由我来成为你的羽翼。
    自我介绍: |-
      断风磐第十七任霍克加尔，法兰塔。
      族人们受你照顾了，谢谢。还有什么想知道的吗？想更了解我…？不，不是不愿意，只是我一时间想不到还能说什么。我记得大家在介绍自己的时候一般会提到爱好之类的…嗯，我喜欢吃辣的东西…抱歉，我可能真的不太擅长这些，但如果你需要我的力量，可以随时来找我。
    详情1: 找我吗？我知道了。
    详情2: 嗯，我在。
    详情3: 风捎来了你的声音。
    关于自己1: |-
      关于我自己的事吗…嗯，
      大家是因为战斗的实力才推选我成为霍克加尔的，但当我接下这个位置，开始承担做决策的责任后，才真正感受到我的师傅当初背负的压力。抱歉，我尽说这些，你可能也会觉得我是个无聊的人吧。
    关于自己2: |-
      之前我用过一阵弓箭，后来就换成了长枪。
      毕竟，我在族人中速度还算快，用枪可以最大限度发挥翅膀的机动力。至于近身战更容易受伤…身为霍克加尔，这不是我应该顾虑的事情。
    关于星临者: |-
      星临之人啊…那些不可思议的知识和能力，
      或许正是来自天空的眷顾吧。不过，即便抛开这个称呼，那个人也一定能像鹰神一样，凭借自己的羽翼飞向更高更远的世界。
    世界见闻1: |-
      我们的成人礼你应该有所了解…
      听说山谷外的其他地方也有类似的传统。他们跳下去的时候还是「孩童」，而起飞时便已是「成人」。
    世界见闻2: |-
      翼人向往天空，渴望展翅飞翔至云端之上，
      传说中那是鹰神所在的地方。但不知为何，当星星坠落时，我却隐约感受到了…天空之外，仍有阴霾。
    趣闻: |-
      有想知道的事就问吧，
      我不会对你隐瞒。
    必杀技: |-
      你应畏惧迫近的风暴…
      坠落吧！天空不属于你。
  牵绊: []
