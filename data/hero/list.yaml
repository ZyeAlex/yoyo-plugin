"101006":
  id: "101006"
  名称: 洛卿
  种族: 龙人族
  势力: 辰王朝
  英文名: LUO QING
  稀有度: SSR
  元素: 水
  武器类型: 鞭子
  技能:
    普攻: |-
      潜龙跃
      【普攻】进行至多四段的多段攻击，对敌方造成至多865%攻击力的水属性魔法伤害。释放星鸣技获得「溯洄」状态后，普攻总共会给敌方附加至多3枚水属性失序印记。
    重击: |-
      对敌方造成361%攻击力的水属性魔法伤害，
      命中敌方将额外增加8点星决蓄能。
    闪击: 造成101%攻击力的水属性魔法伤害。
    跃击: 造成189%攻击力的水属性魔法伤害。
    星携技: |-
      腾龙舞
      【星携技】离场时触发
      唤出雷雨覆盖一片区域（持续5.6秒），每一秒对敌方造成一次38%攻击力的水属性魔法伤害，总共会给敌方额外附加至多3枚水属性失序印记。
    极限反击: 造成267%攻击力的水属性魔法伤害。
    精准防御: |-
      打断敌方本次攻击，
      并且对敌方造成397%攻击力的水属性魔法伤害。
      命中敌方将额外增加8点星决蓄能。
    完美招架: |-
      沧龙洄
      【星鸣技】抛出玉环攻击敌方，至多可进行两段攻击。
      第一段攻击，对敌方造成680%攻击力的水属性魔法伤害，同时自身获得「溯洄」状态，普攻总共会给敌方附加至多3枚水属性失序印记，持续12秒。
      施放第一段攻击后，再次施放星鸣技可进行第二段攻击，造成420%攻击力的水属性魔法伤害。
      施放第二段攻击后，将召唤玉环自动攻击敌方，持续5秒，造成至多231%攻击力的水属性魔法伤害。
    集中闪避: |-
      造成78%攻击力的
      水属性魔法伤害。
    星鸣技: ？
    星结合击: 看你那副表情，似乎有些许啊…所谓云从龙，当我现身的时候，有些天气变化是很正常的现象，不要大惊小怪。
  台词:
    台词: 暮则为霞，晨则为露。
    自我介绍: 晴时唤风，阴时驱雾。
    详情1: 春而登天，秋而潜渊。
    详情2: |-
      唔…什么？若是无事，
      不必勉强来搭话。很在意这个铃铛？好奇心是尔辈的通病吗。与其探求龙的秘密，不如去睡一觉，做个美梦。
    详情3: |-
      我也曾被一些人敬若神明。
      在他们眼中，似乎只要向我献上贡品，一股脑地说出心愿，自然就能风调雨顺，万事胜意…这样的人现在少多了，实乃幸事。
    关于自己1: |-
      我本以为尔辈的精力和能力都很有限，
      可是，却有一个即便麻烦缠身，也总能打起精神的例外存在…是因为失去了往昔记忆的缘故么？可惜了。
    关于自己2: |-
      我并非真能操纵天气，顶多只是通过云雾，
      在一城一地之间降雨而已，若是要覆盖更大的范围，就有些耗神了。你说这已经很厉害了？对于尔辈来说，或许是吧。
    关于星临者: |-
      云海遥是那片高峰连绵的群山的统称，
      祭祀典仪的场所也在其中。我在那里度过了漫长的时间，漫长到尔辈终其一生也难以记述。那些经历，我确实不知如何分享…
    世界见闻1: 我不擅长讲故事。
    世界见闻2: |-
      雷霆雨露，皆有天数…
      邪佞尽散！似尔之辈，焉能遮天？
"101007":
  id: "101007"
  名称: 芃芃
  种族: 帕米族
  势力: 辰王朝
  英文名: PENG PENG
  稀有度: SR
  元素: 火
  武器类型: 弓
  技能:
    普攻: |-
      芃式截拳
      【普攻】进行至多四段的普通攻击，对敌方目标造成最多1105%攻击力的火属性物理伤害。
      普攻第一段命中目标后会自动追击，触发普攻第二段。
      普攻第四段时，可多次连续施放，使之成为持续的多段伤害，随着普攻次数增加，普攻伤害逐渐提升。在普攻第四段过程中施放重击，将派生为额外重击。
    重击: |-
      蓄力重击，造成189%攻击力的火属性物理伤害。
      在普攻第四段的持续攻击过程中蓄力重击，将派生为额外重击，同时提升韧性效果，造成420%攻击力的火属性物理伤害，且会使下一次施放的星鸣技得到强化。
    闪击: 造成126%攻击力的火属性物理伤害。
    跃击: 造成210%攻击力的火属性物理伤害。
    星携技: |-
      猛虎扑食
      【星携技】入场时触发
      对敌方造成547%攻击力的火属性物理伤害，且会使下一次施放的星鸣技得到强化。
    极限反击: 造成376%攻击力的火属性物理伤害。
    精准防御: |-
      格挡敌方本次伤害，并且可以进行反击，
      造成367%攻击力的火属性物理伤害。
      此时施放普通攻击，则直接进入普攻第三段。
    完美招架: |-
      蛟龙戏珠
      【星鸣技】对敌方目标造成672%攻击力的火属性物理伤害。
      施放额外重击/星携技后，星鸣技得到强化，至多消耗2枚火/雷/光属性失序印记，使伤害提升693%。
    集中闪避: |-
      造成78%攻击力的
      火属性物理伤害。
    星鸣技: ？
    星结合击: 哟，你是功夫初学者吗？唔…瞧你根骨还不错，多跟我学着点吧！
  台词:
    台词: |-
      哼哼，你来了！
      今天有好好练武吗？
    自我介绍: 看看我的功夫练得怎么样！
    详情1: 嘿嘿，我厉害吧？
    详情2: |-
      我在吃东西上可是很讲究的！
      像这道金银满，要炸到带一点点焦的火候才最佳。而鲜菱汤呢，就得用刚刚采摘的新鲜菱角，才能炖出那种清甜的味道。不说了，你把那盘芙蓉豆腐往我这边推推，我够不到…
    详情3: |-
      为了挑战天下的功夫好手，
      我可是走遍了整个辰王朝！不过去了这么多地方，我还是最喜欢镜花洲！这里有东西吃，有地方睡…你说这两样在哪里都可以满足吗？那也不一定吧！至少我没有遇到过比吉逸楼更好的地方！
    关于自己1: |-
      虽然那家伙的功夫水平比起我是差远了，
      但也还是有点儿天赋的。只要每天好好练习内功，再跟本大师学上一两招，以后应该也是可以在江湖上打出一点名声的！
    关于自己2: |-
      雾花谷？我去过的！
      那里有很漂亮的花和蝴蝶，但都是有毒的，很可怕吧！而且那边的人神神秘秘的，我不建议你这样的功夫初学者自己去，万一惹出什么麻烦…我可救不了你哦！
    关于星临者: |-
      虽然还没有去过太远的地方…
      但我在巅峰对决打响名号之后，肯定会有很多外国的习武者慕名来向我挑战！到时候，我就可以趁机去别的地方看看了！
    世界见闻1: |-
      江湖上也是流传着
      不少关于本大师的传说的！
    世界见闻2: |-
      所谓功夫…就是——
      稳！准！狠！看我的厉害！
