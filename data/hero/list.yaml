"199001":
  id: "199001"
  名称: 星临者
  英文名: STARBORN
  稀有度: SR
  元素: 无
  武器类型: 单手武器
  技能:
    普攻: |-
      跃动之星
      【普攻】进行至多五段的多段攻击，对敌方造成最多571%攻击力的无属性物理伤害。 
    重击: |-
      蓄力攻击敌方，造成168%攻击力的无属性物理伤害。若在第四/五段普攻后使用重击，则会施放派生攻击，对敌方造成265%攻击力的无属性物理伤害，并使其被破坏架势效率提升10%（持续4秒）。
      派生攻击命中敌方后，可进行突刺，造成63%攻击力的无属性物理伤害。突刺后可衔接普攻第三段。
    闪击: 造成59%攻击力的无属性物理伤害。
    跃击: 造成168%攻击力的无属性物理伤害。
    星携技: |-
      终将归于星海
      【星携技】离场时触发
      星临者在周围留下星辉之环，使半径10米内敌人已有属性失序印记各增加1枚。同时按自身攻击力16%提高附近友方单位的攻击力，该状态持续8秒，期间切换主控角色时状态继承。
    极限反击: 造成210%攻击力的无属性物理伤害。
    精准防御: |-
      打断敌方本次攻击，并且可以进行反击。
      对敌方造成269%攻击力的无属性物理伤害，并使其被破坏架势效率提升10%（持续4秒）。
    完美招架: |-
      明耀之光
      【星鸣技】对敌方造成567%攻击力的无属性物理伤害，并使其被破坏架势效率提升10%（持续6秒）。
      星鸣技命中敌方后，可进行突刺，造成63%攻击力的无属性物理伤害。突刺后可衔接普攻第三段。
    集中闪避: |-
      造成78%攻击力的
      无属性物理伤害。
    星鸣技: ？
    星结合击: 男
  台词:
    台词: 让「星辰」降落。
    自我介绍: 旅途，尚未抵达终点。
    详情1: |-
      从睁开眼的那一刻起，
      纷沓而至的人们便带来了各种各样关于我命运的预言…不，我不打算承认那就是我的命运。
    详情2: |-
      这里的风俗，逐渐熟悉了。
      一起烤肉，代表着分享幸福；向祖先供奉猎物，代表着对庇佑的感激；不过，激烈搏斗居然代表着对友谊的认可…这一点令人困惑。
    详情3: |-
      群星所引…
      星辉闪烁——回应我的意志！
"199003":
  id: "199003"
  名称: 诺诺
  种族: 帕米族
  英文名: NONO
  稀有度: SR
  元素: 地
  职业: 破坏
  武器类型: 长柄武器
  技能:
    普攻: |-
      咻咻嘿咻
      【普攻】进行至多五段的普通攻击，对敌方目标造成最多853%攻击力的地属性物理伤害。
    重击: |-
      对敌方目标造成地属性物理伤害，蓄力时间越长造成的伤害越高。蓄力过程中抗击力提升，最多可二段蓄力。
      若蓄力后立刻施放，则造成总伤害179%的地属性物理伤害；
      若蓄力满一段后施放，则造成总伤害288%的地属性物理伤害；
      若蓄力满二段后施放，则造成总伤害777%的地属性物理伤害。
      蓄力满二段命中敌方目标时，则消耗1枚地/木/风属性调谐，并额外造成294%攻击力的地属性物理伤害，且这次架势破坏倍率提升。
    闪击: 造成168%攻击力的地属性物理伤害。
    跃击: 造成231%攻击力的地属性物理伤害。
    星携技: |-
      呼拉拉猛锤
      【星携技】入场时触发
      入场后对敌方造成225%攻击力的地属性物理伤害。
    极限反击: 造成252%攻击力的地属性物理伤害。
    精准防御: |-
      打断敌方目标本次攻击，并且可以进行反击，
      对敌方目标造成292%攻击力的地属性物理伤害。
    完美招架: |-
      轰隆隆锤
      【星鸣技】对敌方目标造成725%攻击力的多段地属性物理伤害。施放后一段时间内发动普攻，可直接触发二段蓄力攻击。
      此星鸣技施放过程中可以进行移动。
    集中闪避: |-
      造成78%攻击力的
      地属性物理伤害。
    星鸣技: ？
    星结合击: 已经…打起精神来了。诺诺，没搞错方向…大概。
  台词:
    台词: 唔，要一起玩吗？
    自我介绍: |-
      橡果飞击——！
      嗯，满分。
    详情1: 宝物？在哪里？！
    详情2: |-
      这个锤子，用来砸墙和挖土，
      速度很快。在寻宝的时候很有用。所以…要一直带着。
    详情3: |-
      最擅长的游戏，是打地鼠。
      上次玩的时候，诺诺「噗咚——」一下，就把所有洞砸成了一整个大坑…嗯？不是这样玩的吗？
    关于自己1: |-
      胆子很大，很聪明，还很强…
      要是能加入寻宝队，就好了。
    关于自己2: |-
      想去，阿瓦利安看看。缇缇说，
      那里到处都是亮闪闪的…能找到很多宝物吧，应该。
    关于星临者: |-
      夏露露村的大家好像很少出门，
      去更远的地方…但是，他们研究出来的烤肉很好吃！嗯，诺诺喜欢夏露露村。
    世界见闻1: 嗯？
    世界见闻2: |-
      够了！
      呼啦啦地——猛锤！全部打倒…！
