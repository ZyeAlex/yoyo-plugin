"101003":
  id: "101003"
  名称: 寒悠悠
  种族: 智人族
  势力: 辰王朝
  英文名: HAN YOUYOU
  稀有度: SR
  元素: 火
  武器类型: 火枪
  技能:
    普攻: |-
      鸢回影
      进行至多五段的攻击，
      对敌方造成至多672%攻击力的
      火属性物理伤害。
    重击: |-
      蓄力对敌方造成两段重击。
      第一段重击造成总共202%攻击力的火属性物理伤害，命中「焰火」状态敌人时，触发爆炸造成总共158%攻击力的火属性物理伤害。
      第二段重击造成总共302%攻击力的火属性物理伤害，命中「焰火」状态敌人时，触发爆炸造成总共210%攻击力的火属性物理伤害。
      每次触发爆炸时，提升0.6%全队暴击伤害，持续24秒，最多可提升3.6%。
    闪击: 造成172%攻击力的火属性物理伤害。
    跃击: 造成151%攻击力的火属性物理伤害。
    星携技: |-
      沐星雨
      离场时触发
      向前方抛出绳索将敌方聚拢，造成235%攻击力的木属性物理伤害，同时使敌方防御降低8%（持续8秒）。
    极限反击: 造成183%攻击力的火属性物理伤害。
    集中闪避: |-
      成功后可使攻击发起方时缓，并且可以进行反击，造成252%攻击力的火属性物理伤害。
      施放后，提升0.6%全队暴击伤害，持续24秒，最多可提升3.6%。
    星鸣技: |-
      花照夜
      【星鸣技】腾空并向地面发射7颗烟花炸弹，造成655%攻击力的火属性物理伤害烟花炸弹命中敌方时将为其附加「焰火」状态（持续6秒）。

      【星结合击】造成78%攻击力的火属性物理伤害。
    星结合击: |-
      造成78%攻击力的
      火属性物理伤害。
    必杀技: ？
  台词:
    台词: 我叫寒悠悠…嘘…不要这么大声啦！先帮我看看有没有人跟在后面…
    自我介绍: |-
      没错！我就是寒悠悠。
      哎呀，别管我是从哪儿来的啦，如果你打听到那些古代藏宝之地的线索，一定要叫上我喔！什么机关暗器，陷阱埋伏，统统交给我来破解吧！
    详情1: 别那么严肃嘛！
    详情2: 小瞧我可是会吃亏的~
    详情3: 看，我的新作品哦~
    关于自己1: |-
      怎么？没想到我很擅长砍价？
      哼~这可不是钱的问题，身为机关大师，要是连真实价值都判断不出来，那就是大大的失职！
    关于自己2: |-
      制造机关和破除机关都很有意思！
      不过，要是遇到那种没有什么巧思，纯粹是为难而难的设计，我宁可直接炸掉也不想在它上面浪费时间。
    关于星临者: |-
      星临者所面对的局面，
      或许比我见过的任何机关都要复杂…到底是什么在驱动着那家伙前进的呢？我很好奇…我很好奇！
    世界见闻1: |-
      巍峨的城墙一看就能让人产生安全感对吧？
      不过，要是我说的话，还是能跑能跳，自己就会在街上巡逻的石狮子更厉害一点！
    世界见闻2: |-
      我曾听说，各种机关的设计，
      利于人谓之巧，不利于人谓之拙。那么，大自然的鬼斧神工，就该是「大巧若拙」了吧…
    趣闻: |-
      愿意帮我保密的话，
      多告诉你一些事也无妨~
    必杀技: |-
      前有绝景，敬请见证！
      咻——砰啪！这样的烟花，没见过吧？
  牵绊:
    - 剧情名称: 隐姓不埋名
      好感等级: "2"
      台词内容: 身为璇玑城主之女，「魁」姓总是会引来过多的关注。为了隐藏身份，顺带纪念第一次成功制作的机关暗器「寒塘鹤影」，从此她便以「寒悠悠」之名行走江湖了
    - 剧情名称: 修行靠个人
      好感等级: "4"
      台词内容: 虽然寒悠悠从小就被家里安排各种诗书礼乐的熏陶，但随着她逐渐长大，却越来越耐不住性子去恪守那些「教诲」了。与之相对的是，各种恶作剧反而无师自通地熟练了起来
    - 剧情名称: 密道？地道！
      好感等级: "6"
      台词内容: 深宅大院也好，森严家规也罢，都拦不住「心灵手巧」又「向往自由」的寒悠悠。在一扇被她伪装很好的机关活板门之下，便是能直通城外的密道
    - 剧情名称: 机关不是无情物
      好感等级: "8"
      台词内容: 在寒悠悠的认知里，世间万物只分两种：可以动的，以及捣鼓两下就能动的。「能动就是活物！对吧，小九？」给家里的百宝箱安装咬人机关后，兴奋的寒悠悠还给它取了名字
    - 剧情名称: 木改铁，胶改焊
      好感等级: "10"
      台词内容: 寒悠悠也考虑过设计出能帮忙干活的劳动机关，但它们要么力量太强无法控制，要么会在使用过程中诡异爆炸…寒悠悠只能含泪将它们回收，改造成自己最熟悉的武装探险型号
