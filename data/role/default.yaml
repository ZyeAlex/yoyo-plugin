星临者:
  nickname:
    - 主角
  introduce: 每一次文明的迸发，都有启明星引领其中。而带来希望的人，被称为 —— 「星临者」
寒悠悠:
  race: 智人族
  home: 辰王朝
  nickname:
    - 悠悠
    - 唐悠悠
    - 小姨妈
  icon: 2,2
  introduce: 乐观自信、顽皮好动的少女，总能够追寻宝物的气息而至，施展独特的武艺与机关术完成冒险。没有她达不到的目标，如果有，那就再加上一大把鬼点子和钱袋子。
  words:
    - 没错！我就是寒悠悠。如果你打听到那些古代藏宝之地的线索，一定要叫上我喔！
源千代:
  nickname:
    - 千代
  icon: 2,4
忒拉拉:
  race: 兽人族
  introduce: 自称是夏露露村最佳猎人的狼族少女，为了保护重要之人而挥舞长枪不断战斗着，同时对广阔的世界怀有无限的好奇，全力冲刺时从不瞻前顾后，简直是非一般的大胆？
  nickname: []
  icon: 1,1
  home: 夏露露村
  skill:
    name: |
      <b>狩猎枪术</b>
    describe: |
      
      <p><b>  【普攻】</b>挥动长枪发动一连串狩猎攻击，对敌方造成总伤害为447%的多段<b>火属性伤害</b>；普通每多命中一个带有<b>火残响</b>的敌人，全队的<b>大招能量额外再回复</b>1点。
      </p><p><b>  【重击】</b>灵活多变的枪术，以快速的刺击造成86%<b>火属性伤害</b>重击命中敌人，<b>小技能CD减3秒</b>。
      </p><p><b>  【闪击】</b>抓住敌人破绽发动奇袭，向前挥出2击造成60%<b>火属性伤害</b>。
      </p><p><b>【下落攻击】</b>从空中刺向地面，火焰以枪尖为中心扩散，造成45%<b>火属性伤害</b>。
      </p>
西芙莉雅:
  nickname:
    - 西芙利雅
    - 茜芙莉雅
  icon: 4,3
  race: 木精灵族
  home: 洛斯兰瑟
  skill:
    name: |
      <b>精灵弓术</b>
    describe: |
      
      <p><b>【普攻】</b>进入战斗状态，以迅雷之势对敌方造成总伤害为344%的多段<b>风属性伤害</b>。普攻5命中敌人，可给我方附加8层<b>风共鸣</b>。
      </p><p><b> 【重击】</b>可蓄力进入移动射击最多打出10段伤害,共造成攻击力228%<b>风属性伤害</b>，第2/4/6/8/10,可给我方附加2层风共鸣；可提前松开蓄力，停止移动射击。
      </p><p><b>  【闪击】</b>闪避的同时快速向敌人射击，造成43%<b>风属性伤害</b>。
      </p><p><b>【下落攻击】</b>从高处纵身坠击，在落地时造成67%<b>风属性伤害</b>。
      </p>
夏儿:
  race: 高等精灵族
  nickname:
    - 夏尔
  icon: 4,1
  home: 阿瓦利安
  introduce: 隶属于阿瓦利安天马骑士团的精灵少女，有着能让动物们安静下来并愿意与之亲和的温柔气质，也因此和性格桀骜的天马洛伊莱结成了互相信任的搭档。如果为她所拿着的巨大长枪而感到吃惊的话，不如看看少女更加夸张的饭量吧。
  words:
    - 我是夏儿。此后，请允许我与你同行，我一定...能成为你的力量。
  skill:
    name: |
      <b>精灵骑枪术</b>
    describe: |
      
      <p><b>  【普攻】</b>迅速挥动骑士枪，释放多段攻击。对敌方造成总伤害为407%的多段<b>水属性伤害</b>，如果敌人身上有<b>神威</b>(光残响、雷残响、火残响),攻击到敌人后额外获得&nbsp;&nbsp;<b>大招能量</b>1点。
      </p><p><b>  【重击】</b>长按：凝聚魔力并穿刺敌人。长按攻击键进行蓄力，蓄满后对敌方造成262%的<b>光属性伤害</b>，如果提前松开则会造成218%的<b>光属性伤害</b>。若此攻击命中敌人，会尝试消耗1层<b>神威</b>(光残响、雷残响、火残响)并额外提升100%的伤害。蓄满的最后一击消耗8层<b>神威</b>(光残响、雷残响、火残响),提高伤害163%。
      </p><p>（文字缺失）
      </p>
佩佩:
  race: 帕米族
  home: 辰王朝
  introduce: 迷倒镜花洲万千食客的吉逸楼唯一指定看板娘，会功夫会算账会卖萌的熊猫帕米佩佩是也！试图打趣或者刁难佩佩的客人还请三思，毕竟后厨师傅的大铁勺可是不忌荤腥的。
  nickname: []
诺诺:
  race: 帕米族
  icon: 3,2
  introduce: 帕米探险二人组的其中一员，探索能抵达的深度全看诺诺的大锤重击的力度，重要的是吃饭睡觉和一切闪亮亮的东西，比起用语言还是行动说明更好，至于沟通交流……还是交给另一位搭档吧！
  nickname: []
  skill:
    name: |
      <b>咻咻嘿咻！</b>
    describe: |
      
      <p><b>  【普攻】</b>身体跟着大锤一同挥舞，对敌方造成总伤害为311%的多段<b>地属性伤害</b>。
      </p><p><b>  【重击】</b>长按：「准备……1,2,3……咚!!」按住攻击键进行蓄力，在特定时机释放会造成更高伤害。一档瞬间释放会对敌方造成总伤害170%的多段<b>地属性伤害</b>，二档瞬间释放会对敌方造成总伤害350%的多段<b>地属性伤害</b>。此外仅会对敌方造成50%的<b>地属性伤害</b>。
      </p><p><b>  【闪击】</b>翻滚向前，给予敌人一记横扫突袭，对敌方造成76%的多段<b>地属性伤害</b>。
      </p><p><b>【下落攻击】</b>（文字缺失）
      </p>
