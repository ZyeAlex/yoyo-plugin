101003:
  name: 寒悠悠
  en: HAN YOUYOU
  rarity: 4
  attr: 火
  weapon: 火枪
  race: 智人族
  home: 辰王朝
  skill:
  - name: 普攻 - 鸢回影
    describe: |
      【普攻】进行至多五段的攻击，对敌方造成至多672%攻击力的火属性物理伤害。
      【重击】蓄力对敌方造成两段重击。
        第一段重击造成总共202%攻击力的火属性物理伤害，命中「焰火」状态敌人时，触发爆炸造成总共158%攻击力的火属性物理伤害。
        第二段重击造成总共302%攻击力的火属性物理伤害，命中「焰火」状态敌人时，触发爆炸造成总共210%攻击力的火属性物理伤害。
        每次触发爆炸时，提升0.6%全队暴击伤害，持续24秒，最多可提升3.6%。
      【闪击】造成172%攻击力的火属性物理伤害。
      【跃击】造成151%攻击力的火属性物理伤害。
      予火药以元气，予机关以灵魂！
  - name: 星携技 - 沐星雨
    describe: |
      【星携技】离场时触发
        向前方抛出绳索将敌方聚拢，造成235%攻击力的木属性物理伤害，同时使敌方防御降低8%（持续8秒）。
      【极限反击】造成183%攻击力的火属性物理伤害。
      【集中闪避】成功后可使攻击发起方时缓，并且可以进行反击，造成252%攻击力的火属性物理伤害。
        施放后，提升0.6%全队暴击伤害，持续24秒，最多可提升3.6%。
      想再多看两眼？那就干脆留下来吧！
  - name: 星鸣技 - 花照夜
    describe: |
      【星鸣技】腾空并向地面发射7颗烟花炸弹，造成655%攻击力的火属性物理伤害烟花炸弹命中敌方时将为其附加「焰火」状态（持续6秒）。
      【星结合击】造成78%攻击力的火属性物理伤害。
      视线都要跟不上了？没关系，马上就会亮堂起来啦。
  words:
  - 我叫寒悠悠…嘘…不要这么大声啦！先帮我看看有没有人跟在后面…
  - 没错！我就是寒悠悠。哎呀，别管我是从哪儿来的啦，如果你打听到那些古代藏宝之地的线索，一定要叫上我喔！什么机关暗器，陷阱埋伏，统统交给我来破解吧！
  - 别那么严肃嘛！
  - 小瞧我可是会吃亏的~
  - 看，我的新作品哦~
  - 怎么？没想到我很擅长砍价？哼~这可不是钱的问题，身为机关大师，要是连真实价值都判断不出来，那就是大大的失职！
  - 制造机关和破除机关都很有意思！不过，要是遇到那种没有什么巧思，纯粹是为难而难的设计，我宁可直接炸掉也不想在它上面浪费时间。
  - 星临者所面对的局面，或许比我见过的任何机关都要复杂…到底是什么在驱动着那家伙前进的呢？我很好奇…我很好奇！
  - 巍峨的城墙一看就能让人产生安全感对吧？不过，要是我说的话，还是能跑能跳，自己就会在街上巡逻的石狮子更厉害一点！
  - 我曾听说，各种机关的设计，利于人谓之巧，不利于人谓之拙。那么，大自然的鬼斧神工，就该是「大巧若拙」了吧…
  - 愿意帮我保密的话，多告诉你一些事也无妨~
  - 前有绝景，敬请见证！咻——砰啪！这样的烟花，没见过吧？
