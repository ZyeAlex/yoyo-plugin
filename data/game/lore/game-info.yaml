  - id: 凶兽
    title: 凶兽
    level: 2
    text: |-
      测试中的凶兽均不可捕捉。

      凶兽存在位阶的设定，其中暗焰兽为厄位凶兽，厄位凶兽不需要睡眠也不需要繁殖，只要不击碎核心就会不断重生。

      暂时不明确凶兽是否存在分类和成长阶段。
