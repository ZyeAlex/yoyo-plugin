  - id: 地区
    title: 地区
    level: 2
    text: >-
      目前，官网已公布了世界地图中的部分地区：新芽山谷、夏露露村、弗利斯、镜花洲、勒布

      新芽山谷（Sprout Valley）：由森林、山谷、湖泊、草原等构成的广大区域。

      夏露露村（Charlulu Village）：位于新芽山谷西南，是一个由兽人族为主构成的村落，居民以打猎和采集为生，与外界的交流沟通很少。

      弗利斯（Fleece）：以中世纪欧洲为原型的地区，内有文化多元的自由贸易城邦弗利斯城邦（Fleece
      City），附近遗留有部分第三纪元时期留下的圆环状残骸。

      镜花洲（Jinghua Cape）：以中国江南水乡为原型的地区，所属国度辰王朝（Chen Dynasty）。

      勒布（Lebe）：以蒸汽工业文明为原型的地区，所属国度罗吉尼亚联邦。

      从角色语音中，还包括以下非阵营名的地区名：

      黄金海岸：从末音口中得知，位于洛斯兰瑟的沿海。

      塔尔西斯：从末音口中得知，其为一片红色沙漠地区，所属不明。

      雾花谷：从芃芃口中得知，有很多带毒的花和蝴蝶，推测所属辰王朝。

      云海遥：从洛卿口中得知，洛卿的隐居地，一片高峰连绵的群山的统称，祭祀典仪的场所也在其中，推测所属辰王朝。

      阿瓦利安大森林：从露米口中得知，是纤羽叶的主要生长地。
    charCount: 511
