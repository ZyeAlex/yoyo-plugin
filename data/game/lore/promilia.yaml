  - id: 世界观
    title: 世界观
    level: 2
    text: |-
      当星空珍存的故事被改写，
      当预言也无法提及之人出现。
      星临者，跟随那流星的轨迹，
      改写这片星原的历史吧。

      这个世界与你熟知的并不相同。
      文明、魔法、不可思议的幻想生物，被星空珍存的传说，在此构筑想象以上的广袤星原。
      纵身飞跃，从深海到天空，再一次与新的生命邂逅，并与之结缘；
      在流星的指引下、在闪耀的群星中，这只属于你的——
      整个宇宙都翘首以盼的，星辰与旅途的歌谣。

      「那些」战争结束以后，星空仍未回归宁静。
      凶兽肆虐，引力消散，时间仿佛带走了记忆、平衡，以及——牵挂。

      但星原下的智慧种族，
      从未放弃刻印在血脉深处的因果。
      希望与天穹的意志抗衡，
      被寄予未来的幻想生物，
      至今期待着与你的约定之日。

      追逐、探索、直至我们回到目的地。
      等待、邂逅、哪怕改变流星的轨迹。

      然后再一次，谱写成诗。

      向往星原的奇幻旅途，将与你再次重逢。
      星临者，欢迎回到普罗米利亚！
    charCount: 386
