  - id: 进化教派
    title: 进化教派
    level: 4
    text: |-
      据露米所说，进化教派是一个遍布大陆各地的庞大而古老的组织，行事风格诡秘莫测，没有人知道他们的目的究竟是什么。他们四处捕捉珍惜奇波，甚至是抢夺他人已经星结的奇波，来满足自己的邪恶研究，曾经引发过好几次厄级凶兽事件。
      进化教派使用苏亚能量，能将奇波转化为凶化奇波，并且能操纵凶兽。根据进化教派成员的对话，他们在寻找能够承载进化之力的奇波样本，目的是“伟大的进化”。
      代表角色：N/A
    charCount: 189
