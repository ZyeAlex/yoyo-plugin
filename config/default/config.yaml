# 通过setting.config获取本配置
title: "悠悠助手"
subTitle: "yoyo-plugin"

# 角色图片
imgMaxSize: 10 #上传图片大小限制 MB
imgPath: [] #角色图片库的路径 从Bot根目录开始，如 '/plugins/yoyo-image/' ，路径下须是以角色命名的文件夹

# 监测PV播放量
PVList:
- BV1Jr421n7n4
- BV1KUopYZEs5

# 签到群聊
signInclude: []
signExclude: []

# 指令前缀 若和别的游戏冲突，更换其他前缀即可
rulePrefix:
- "~"
- "～"
- "#?蓝原"
- "#?蓝色星原"
