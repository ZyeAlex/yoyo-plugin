# 指令前缀 若和别的游戏冲突，更换其他前缀即可
rulePrefix:
- "~"
- "～"
- "#?蓝原"
- "#?蓝色星原"

# 角色图片
imgMaxSize: 10 #上传图片大小限制 MB
imgPath:
#角色图片库的路径 从Bot根目录开始，如 'plugins/yoyo-image/' ，路径下须是以角色命名的文件夹
- plugins/yoyo-image
# todo
characterImgPath: [] #立绘图 无背景图片 
# todo
heroGuidePath: [] #角色攻略图
imgUpAuth: all # 图片上传权限 "master"|"admin"|"owner"|"all"
imgDelAuth: all # 图片删除权限 "master"|"admin"|"owner"|"all"
# 资源配置
# UI 图标从 BWIKI 下载，见 utils/UI.js
wikiLoreRefreshHours: 168 # BWIKI 背景页缓存有效期（小时），到期后插件启动/定时任务自动刷新

# 签到
sign: true # 开启签到
signWithdrawal: false # 签到撤回
signInclude: [] # 签到包含群聊
signExclude: [] # 签到排除群聊

# Agent（悠悠 / YoAgent）— 插件与后端共用 config/config.yaml
agentEnabled: false # 总开关（插件侧）
agentPort: 8787 # YoAgent 后端端口（CORS 同源自动对齐此端口）
agentTimeout: 120 # 请求超时（秒，插件侧）；建议 ≥ (agentMaxSteps+2)*agentLlmTimeoutSec
agentStreamEnabled: true # 使用 SSE 流式接口（工具执行中推送状态回复）；失败时回退同步 JSON
agentIsAt: true # 群聊需 @ 机器人或唤醒词（见 agentWakeWords）时触发
agentWakeWords:
  - 悠悠
  - 小悠
agentLegacyFullPrompt: false # true=回退旧版全量 system 注入（临时兼容）
agentInclude: [] # 启用群白名单（空=不监听任何群）
agentBufferSize: 10 # 单次 @ 对话附带的最近群聊条数（插件侧缓冲）
agentSessionHistoryTurns: 10 # 每群保留最近 N 次 @ 对话（YoAgent 进程内，重启清空）
agentSessionHistoryMaxChars: 800 # 单条历史消息最大字符数
agentLogLevel: INFO # 后端日志级别
agentLlmApiKey: "" # LLM API Key（OpenAI 兼容）
agentLlmBaseUrl: "" # LLM 接口基址（不含 /chat/completions）
agentLlmModel: gpt-4o-mini # LLM 模型名
agentMaxInputTokens: 6000 # 单次请求最大输入 token
agentMaxOutputTokens: 512 # 单次回复最大输出 token
agentMaxSteps: 12 # Agent 最大推理步数（写代码/多工具任务宜 8~16）
agentLlmTimeoutSec: 120 # 单次 LLM 请求超时（秒）；list_dir/多步 ReAct 后一轮常 >60s
agentSkillsDir: "" # 用户技能目录，空=server/src/agent/memory/skills（内置在 src/agent/skills/）
agentToolResultMaxChars: 1500 # 工具结果截断长度
# 工具并发组上限（0 或不填=该组不限制；普通聊天/只读工具不受此限）
agentToolConcurrency:
  fs_write: 1 # write/edit/save_skill 等同组互斥，同时仅 1 人
  script: 1 # 脚本执行
  draw_image: 3 # 画图类（含未来 draw_image 工具），同时最多 3 人
agentFileReadMaxChars: 50000 # 单次 read 最大字符
agentFileWriteMaxChars: 100000 # 单次 write/edit 最大字符
agentScriptTimeoutSec: 120 # 脚本执行超时（秒）
agentWebMarkdownProvider: jina # 网页转 Markdown：mock | direct | jina（Jina 不可达时自动直连）
agentJinaApiKey: "" # Jina API Key（可选，提高限速）
agentMemoryMaxInjectChars: 600 # 记忆+技能目录注入 system 的总字符上限
agentMemoryCharLimit: 2200 # 本群 MEMORY.md 字符上限
agentGlobalMemoryCharLimit: 2200 # 全局 MEMORY.md 字符上限
agentUserMemoryCharLimit: 1375 # 本群 USER.md 字符上限
agentDailyLogInjectChars: 800 # 今/昨日誌注入上限
agentDailyLogMaxChars: 4000 # 单日誌文件上限
agentMemoryShortTermDays: 2 # 注入最近 N 天日誌（默认今+昨）
agentMaxReplies: 3 # 单次 @ 最多连发几条 QQ 消息（1~3）
agentReplyDelayMinMs: 500 # 连发第 2/3 条前随机延时下限（毫秒）
agentReplyDelayMaxMs: 2000 # 连发第 2/3 条前随机延时上限（毫秒）
agentVisionEnabled: true # 按需图片识别（describe_image 工具）
agentVisionModel: doubao-seed-1-8-251228 # 视觉模型（与 agentLlmBaseUrl/Key 共用）
agentVisionMaxImages: 2 # 单次 @ 最多分析几张候选图
agentVisionMaxBytes: 5242880 # 单图下载上限（5MB）
agentEmoticonEnabled: true # 表情包 Sidecar：提取入库 src/agent/memory/emoticon/
agentEmoticonMaxIndexPerTurn: 3 # 每次 @ 后台最多索引几张新表情包
agentEmoticonSearchLimit: 6 # search_emoticons 默认返回条数
agentEmoticonRecencyHalfLifeDays: 14 # 时效权重半衰期（天）
agentEmoticonCatalogInjectMax: 12 # 已废弃（保留兼容）
agentEmoticonCatalogInjectChars: 600 # 已废弃（保留兼容）