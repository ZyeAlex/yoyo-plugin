# 通过setting.config获取本配置

name: "yoyo-plugin"
title: "悠悠小助手"
subTitle: "yoyo-plugin (群:882552331)"
version: "1.0.0"


# 图片
imgMaxSize: 5 #上传图片大小限制 MB

# pixiv
pixivImageProxy: i.pixiv.re
hibiAPI: https://hibi.Yunzai-Bot.com
excludeAI: true # 包含AI图片

# 指令前缀
rulePrefix:
- ">"
- "›"
- "＞"
- "yy"
- "yoyo"
- "悠悠"
- "寒悠悠"
- "#?蓝原"
- "#?旅谣"
- "#?蓝色星原"
